<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magic Match Game</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for the Memory Game */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .card {
            height: 80px;
            background: #4a90e2;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: transparent; /* Hide the emoji */
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            user-select: none;
        }
        .card.flipped {
            background: #fff;
            color: #000; /* Show the emoji */
            transform: rotateY(180deg);
            border: 2px solid #ffd700;
        }
        .card.matched {
            background: #a2d149;
            color: white;
            cursor: default;
            visibility: visible;
        }
        #message { font-size: 20px; font-weight: bold; color: #2c3e50; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Magic Match ✨</h1>
        <p>Find all the pairs to win!</p>
        
        <div id="message">Pairs found: 0/8</div>
        
        <div class="game-grid" id="grid">
            <!-- Cards will be generated by JavaScript -->
        </div>

        <button class="btn blue" onclick="resetGame()">Restart Game</button>
        <br>
        <a href="index.html" class="btn red">🏠 Back to Menu</a>
    </div>

    <script>
        const emojis = ['🐉', '🐉', '🧚', '🧚', '💎', '💎', '🦄', '🦄', '🍄', '🍄', '⭐', '⭐', '🍎', '🍎', '🏰', '🏰'];
        let flippedCards = [];
        let matchedPairs = 0;
        let canClick = true;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const shuffledEmojis = shuffle([...emojis]);

            shuffledEmojis.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canClick || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            card.innerText = card.dataset.emoji;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            canClick = false;
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('message').innerText = `Pairs found: ${matchedPairs}/8`;
                flippedCards = [];
                canClick = true;

                if (matchedPairs === 8) {
                    document.getElementById('message').innerText = "🎉 YOU WIN! You found them all! 🎉";
                }
            } else {
                // If not a match, wait 1 second then flip back
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '';
                    card2.innerText = '';
                    flippedCards = [];
                    canClick = true;
                }, 1000);
            }
        }

        function resetGame() {
            matchedPairs = 0;
            flippedCards = [];
            canClick = true;
            document.getElementById('message').innerText = "Pairs found: 0/8";
            createBoard();
        }

        // Start the game for the first time
        createBoard();
    </script>
</body>
</html>
