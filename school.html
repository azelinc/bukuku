<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Hub - AF Hub</title>
    
    <!-- CSS for Desktop -->
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    
    <!-- CSS for Mobile -->
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .filter-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: white; font-weight: bold; color: #555; }
        
        /* Grid for Train Sifir Selection */
        .sifir-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 10px; }
        .train-card { 
            background: white; border: 2px solid #eee; padding: 15px; border-radius: 15px; 
            text-align: center; text-decoration: none; color: #333; font-weight: bold; transition: 0.2s;
        }
        .train-card:hover { border-color: #4a90e2; transform: translateY(-3px); }
        .train-card.mastered { border-color: #2ecc71; background: #f0fff4; }
        .mastered-label { display: block; color: #2ecc71; font-size: 0.7rem; margin-top: 5px; }

        @media (max-width: 600px) {
            .sifir-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container wide-container">
        <!-- HEADER -->
        <header class="app-header">
            <h1>🏫 School Hub</h1>
            <div class="header-right">
                <span id="user-badge" class="user-badge">Explorer</span>
                <a href="index.html" class="home-icon-btn">🏠</a>
            </div>
        </header>

        <div class="library-layout">
            <!-- SIDEBAR: SWAPPED ORDER -->
            <div class="sidebar">
                <button id="tab-tuition" class="tab-btn active" onclick="openTab('tuition', this)">🎓 Tuition</button>
                <button id="tab-sifir" class="tab-btn" onclick="openTab('sifir', this)">🔢 Sifir Master</button>
                <button id="tab-train" class="tab-btn" onclick="openTab('train', this)">🧠 Train Sifir</button>
                <!-- STEM MOVED TO BOTTOM -->
                <button class="tab-btn tab-btn-disabled">🧪 STEM (Soon)</button>
            </div>

            <div class="main-content">

                <!-- 1. TUITION SECTION (Default Visible) -->
                <div id="tuition" class="category-content" style="display: block;">
                    <div class="filter-bar">
                        <button class="filter-btn active" onclick="filterGrade('all', this)">All</button>
                        <button class="filter-btn" onclick="filterGrade('4', this)">Std 4</button>
                        <button class="filter-btn" onclick="filterGrade('5', this)">Std 5</button>
                        <button class="filter-btn" onclick="filterGrade('6', this)">Std 6</button>
                    </div>
                    <div id="matrix-container"></div>
                </div>

                <!-- 2. SIFIR MASTER SECTION -->
                <div id="sifir" class="category-content" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 10px;">🔢 Sifir Master</h2>
                    <div class="subject-card" style="text-align: center;">
                        <p id="sifir-highscore" style="font-weight: bold; color: #f39c12; margin-bottom: 15px;">Best Score: 0/10</p>
                        <a href="sifir.html" class="btn blue-btn">Start Sifir Challenge 🚀</a>
                    </div>
                    <h3 style="text-align: center; margin: 20px 0 10px; color: #2c3e50;">🏆 Global Top 10</h3>
                    <div style="background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden;">
                        <table class="lb-table"><tbody id="leaderboard-body"></tbody></table>
                    </div>
                </div>

                <!-- 3. TRAIN SIFIR SECTION -->
                <div id="train" class="category-content" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 5px; font-size: 1.2rem;">🧠 Memorization Training</h2>
                    <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px;">Master each table from 1 to 12</p>
                    <div class="sifir-grid" id="train-grid"></div>
                </div>
                
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user') || "Explorer";
        document.getElementById('user-badge').innerText = `👤 ${kidName}`;

        async function generateHub() {
            const matrixContainer = document.getElementById('matrix-container');
            const trainGrid = document.getElementById('train-grid');
            const lbBody = document.getElementById('leaderboard-body');
            
            let userScores = {}; let masterDataList = []; let isPremium = false;

            try {
                const userDoc = await getDoc(doc(db, "users", kidName));
                if (userDoc.exists()) {
                    userScores = userDoc.data().scores || {};
                    isPremium = userDoc.data().isPremium || false;
                }

                // Global Rankings Merge
                const userProfiles = await getDocs(collection(db, "users"));
                userProfiles.forEach(uDoc => {
                    const data = uDoc.data();
                    if (data.scores?.['sifir-master-obj']) masterDataList.push({ name: uDoc.id, ...data.scores['sifir-master-obj'] });
                    else if (data.scores?.['sifir-master']) masterDataList.push({ name: uDoc.id, score: data.scores['sifir-master'], time: 999 });
                });
                const newAttempts = await getDocs(query(collection(db, "sifir_scores"), limit(100)));
                newAttempts.forEach(aDoc => masterDataList.push(aDoc.data()));
                masterDataList.sort((a, b) => b.score - a.score || a.time - b.time);
                lbBody.innerHTML = '';
                masterDataList.slice(0, 10).forEach((entry, index) => {
                    const timeDisplay = entry.time === 999 ? "N/A" : entry.time + "s";
                    lbBody.innerHTML += `<tr><td>#${index + 1}</td><td class="col-name">${entry.name}</td><td>${entry.score}/10</td><td>${timeDisplay}</td></tr>`;
                });
                if(userScores['sifir-master'] !== undefined) document.getElementById('sifir-highscore').innerText = `Best Score: ${userScores['sifir-master']}/10`;
            } catch (e) { console.error(e); }

            // BUILD TRAIN GRID
            trainGrid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const isMastered = userScores[`train-${i}`] === 12;
                const card = document.createElement('a');
                card.href = `train-engine.html?n=${i}`;
                card.className = `train-card ${isMastered ? 'mastered' : ''}`;
                card.innerHTML = `Sifir ${i}${isMastered ? '<span class="mastered-label">✅ Mastered</span>' : ''}`;
                trainGrid.appendChild(card);
            }

            // BUILD TUITION MATRIX
            matrixContainer.innerHTML = '';
            const subjects = [{ id: 'math', name: 'Mathematics', color: '#4a90e2', sets: 3 }, { id: 'sci', name: 'Science', color: '#0097a7', sets: 3 }, { id: 'eng', name: 'English', color: '#f39c12', sets: 10 }];
            subjects.forEach(sub => {
                let html = `<div class="subject-card"><h3 style="color:${sub.color}; font-size: 1rem; margin-bottom: 10px;">${sub.name}</h3>`;
                [4, 5, 6].forEach(lvl => {
                    html += `<div class="grade-row grade-block-${lvl}"><div class="grade-label">Std ${lvl}</div><div class="set-group">`;
                    for (let setNum = 1; setNum <= sub.sets; setNum++) {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = userScores[scoreKey] || 0;
                        const isLocked = (sub.id === 'eng' && setNum >= 6 && !isPremium);
                        if (isLocked) html += `<div class="set-circle locked"><span>🔒</span></div>`;
                        else html += `<a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" class="set-circle ${bestScore >= 5 ? 'done' : ''}" style="background-color: ${sub.color}"><span>${setNum}</span>${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}</a>`;
                    }
                    html += `</div></div>`;
                });
                html += `</div>`;
                matrixContainer.innerHTML += html;
            });
        }

        window.openTab = (categoryName, element) => {
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(categoryName).style.display = "block";
            if(element) element.classList.add("active");
        }

        window.filterGrade = (lvl, btn) => {
            const btns = document.getElementsByClassName('filter-btn');
            for(let b of btns) b.style.background = "white", b.style.color = "#555";
            btn.style.background = "#1a1a2e", btn.style.color = "white";
            const allRows = document.getElementsByClassName('grade-row');
            for(let row of allRows) {
                if (lvl === 'all') row.style.display = 'flex';
                else row.style.display = row.classList.contains(`grade-block-${lvl}`) ? 'flex' : 'none';
            }
        };

        const params = new URLSearchParams(window.location.search);
        if (params.get('tab') === 'sifir') openTab('sifir', document.getElementById('tab-sifir'));
        else if (params.get('tab') === 'train') openTab('train', document.getElementById('tab-train'));
        
        generateHub();
    </script>
</body>
</html>
