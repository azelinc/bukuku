<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub - AF Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 12px; overflow: hidden; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .leaderboard-table th { background: #f39c12; color: white; padding: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .leaderboard-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; color: #444; font-weight: bold; }
        .leaderboard-table tr:nth-child(even) { background: #fffaf0; }
        .rank-1 { color: #d4af37; font-size: 1.2rem; } /* Gold */
        .rank-2 { color: #aaa9ad; } /* Silver */
        .rank-3 { color: #b08d57; } /* Bronze */
    </style>
</head>
<body>
    <div class="container wide-container">
        <div style="padding: 15px; border-bottom: 2px solid #eee; text-align: center;">
            <h1 style="margin: 0; font-size: 1.5rem;">🏫 School Hub</h1>
        </div>

        <div class="library-layout">
            <div class="sidebar">
                <button id="tab-tuition" class="tab-btn active" onclick="openTab('tuition', this)">🎓 Tuition</button>
                <button id="tab-sifir" class="tab-btn" onclick="openTab('sifir', this)">🔢 Sifir Practice</button>
                <button class="tab-btn tab-btn-disabled">🧪 STEM (Soon)</button>
                <div style="flex-grow: 1;"></div>
                <a href="index.html" class="tab-btn" style="text-decoration:none; color:#e74c3c; text-align:center;">🏠 Home</a>
            </div>

            <div class="main-content">
                <!-- TUITION SECTION -->
                <div id="tuition" class="category-content">
                    <h2 style="font-size: 1.2rem; margin-bottom: 15px; text-align: center; color: #666;">Choose a Study Set</h2>
                    <div id="matrix-container"></div>
                </div>

                <!-- SIFIR SECTION -->
                <div id="sifir" class="category-content" style="display:none;">
                    <h2 style="text-align: center; margin-bottom: 10px;">🔢 Sifir Master</h2>
                    <div class="subject-card" style="text-align: center;">
                        <p id="sifir-highscore" style="font-weight: bold; color: #f39c12; margin-bottom: 15px;">Best Score: 0/10</p>
                        <a href="sifir.html" class="btn blue-btn">Start Sifir Challenge 🚀</a>
                    </div>

                    <h3 style="text-align: center; margin-top: 25px; color: #2c3e50;">🏆 Global Top 5</h3>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Name</th>
                                <th>Score</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user');

        const subjects = [
            { id: 'math', name: 'Mathematics (DLP)', color: '#4a90e2', sets: 3 },
            { id: 'sci', name: 'Science (DLP)', color: '#0097a7', sets: 3 },
            { id: 'eng', name: 'English Language', color: '#f39c12', sets: 10 } // Expanded to 10
        ];

        async function generateMatrix() {
            const container = document.getElementById('matrix-container');
            const lbBody = document.getElementById('leaderboard-body');
            lbBody.innerHTML = '<tr><td colspan="4">Loading Rankings...</td></tr>';
            
            let scores = {};
            let allUsers = [];

            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const userScores = data.scores || {};
                    if (doc.id === kidName) scores = userScores;
                    if (userScores['sifir-master-obj']) {
                        allUsers.push({ name: doc.id, ...userScores['sifir-master-obj'] });
                    }
                });

                if (scores['sifir-master'] !== undefined) {
                    document.getElementById('sifir-highscore').innerText = `Best Score: ${scores['sifir-master']}/10`;
                }

                allUsers.sort((a, b) => b.score - a.score || a.time - b.time);
                lbBody.innerHTML = '';
                if (allUsers.length === 0) {
                    lbBody.innerHTML = '<tr><td colspan="4">No scores yet. Be the first!</td></tr>';
                } else {
                    allUsers.slice(0, 5).forEach((user, index) => {
                        const row = `<tr><td class="rank-${index+1}">${index+1}</td><td>${user.name}</td><td>${user.score}/10</td><td>${user.time}s</td></tr>`;
                        lbBody.innerHTML += row;
                    });
                }
            } catch (e) { console.error(e); }

            container.innerHTML = '';
            subjects.forEach(sub => {
                let html = `<div class="subject-card"><h3 style="color:${sub.color}; font-size: 1.1rem; margin-bottom: 10px;">${sub.name}</h3>`;
                [4, 5, 6].forEach(lvl => {
                    html += `<div class="grade-row"><div class="grade-label">Std ${lvl}</div><div class="set-group" style="flex-wrap: wrap; justify-content: flex-end;">`;
                    
                    // Creates circles based on the number of sets defined in the subjects array
                    for (let setNum = 1; setNum <= sub.sets; setNum++) {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = scores[scoreKey] || 0;
                        const doneClass = bestScore >= 5 ? 'done' : '';
                        html += `<a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" class="set-circle ${doneClass}" style="background-color: ${sub.color}; margin-bottom: 5px;">${setNum}${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}</a>`;
                    }
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        window.openTab = (categoryName, element) => {
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(categoryName).style.display = "block";
            if(element) element.classList.add("active");
        }

        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('tab') === 'sifir') openTab('sifir', document.getElementById('tab-sifir'));
        }

        generateMatrix();
        checkUrlParams();
    </script>
</body>
</html>
