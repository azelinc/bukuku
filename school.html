<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub - AF Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container wide-container">
        <div style="padding: 15px; border-bottom: 2px solid #eee; text-align: center;">
            <h1 style="margin: 0; font-size: 1.5rem;">🏫 School Hub</h1>
        </div>

        <div class="library-layout">
            <div class="sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tuition')">🎓 Tuition</button>
                <button class="tab-btn" onclick="openTab(event, 'stem')">🧪 STEM Facts</button>
                <div style="flex-grow: 1;"></div>
                <a href="index.html" class="tab-btn" style="text-decoration:none; color:#e74c3c; text-align:center;">🏠 Home</a>
            </div>

            <div class="main-content">
                <div id="tuition" class="category-content">
                    <h2 style="font-size: 1.2rem; margin-bottom: 15px; text-align: center;">Choose a Study Set</h2>
                    <div id="matrix-container"></div>
                </div>

                <div id="stem" class="category-content" style="display:none;">
                    <h2>🧪 STEM Explorer</h2>
                    <a href="book-space.html" class="btn green-btn">🚀 Mission to Mars</a>
                    <a href="buku-tenaga-solar.html" class="btn green-btn">☀️ Tenaga Solar</a>
                    <a href="buku-tenaga-air.html" class="btn green-btn">🌊 Kuasa Empangan</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { profiles: {}, current: null };
        const kidName = hubData.current;

        const subjects = [
            { id: 'math', name: 'Mathematics (DLP)', color: '#4a90e2' },
            { id: 'sci', name: 'Science (DLP)', color: '#2ecc71' },
            { id: 'eng', name: 'English Language', color: '#f39c12' }
        ];

        function generateMatrix() {
            const container = document.getElementById('matrix-container');
            const scores = (hubData.profiles[kidName] && hubData.profiles[kidName].scores) ? hubData.profiles[kidName].scores : {};

            subjects.forEach(sub => {
                let html = `<div class="subject-card">
                    <h3 style="color:${sub.color}; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 2px solid ${sub.color}22;">${sub.name}</h3>`;
                
                [4, 5, 6].forEach(lvl => {
                    html += `<div class="grade-row">
                        <div class="grade-label">Std ${lvl}</div>
                        <div class="set-group">`;
                    
                    [1, 2, 3].forEach(setNum => {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = scores[scoreKey] || 0;
                        const isDone = bestScore >= 5;
                        const doneClass = isDone ? 'done' : '';
                        
                        html += `
                            <a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" 
                               class="set-circle ${doneClass}" 
                               style="background-color: ${sub.color}">
                               ${setNum}
                               ${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}
                            </a>`;
                    });
                    
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function openTab(evt, categoryName) {
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) { contents[i].style.display = "none"; }
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            document.getElementById(categoryName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        generateMatrix();
    </script>
</body>
</html>
