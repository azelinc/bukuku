<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Hub - AF Hub</title>
    
    <!-- Link to PC Styles -->
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    
    <!-- Link to Mobile Styles -->
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        /* Specific page overrides to ensure top alignment */
        .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .filter-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: white; font-weight: bold; color: #555; }
        
        .sifir-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .train-card { 
            background: white; border: 2px solid #eee; padding: 15px; border-radius: 15px; 
            text-align: center; text-decoration: none; color: #333; font-weight: bold; transition: 0.2s;
        }
        .train-card.mastered { border-color: #2ecc71; background: #f0fff4; }
        .mastered-label { display: block; color: #2ecc71; font-size: 0.7rem; margin-top: 5px; }

        /* Premium Modal Overlay */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-card {
            background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; 
            text-align: center; border: 5px solid #f1c40f;
        }

        @media (max-width: 600px) {
            .sifir-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
        /* Specific fix for the Sifir Master button */
        #sifir-start-btn {
            display: block !important;
            width: 100% !important;
            max-width: 300px !important;
            margin: 20px auto !important;
            padding: 18px !important;
            background-color: #4a90e2 !important;
            color: white !important;
            text-decoration: none !important;
            font-weight: 800 !important;
            border-radius: 18px !important;
            text-align: center !important;
            border-bottom: 5px solid #2e6cb5 !important;
            font-size: 1.1rem !important;
                }

        #sifir-start-btn:active {
            transform: translateY(4px) !important;
            border-bottom-width: 1px !important;
        }
    </style>
</head>
<body>

    <!-- PREMIUM MODAL -->
    <div id="premium-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="color: #f39c12; margin-bottom: 10px;">⭐ Unlock Premium</h2>
            <p style="margin-bottom: 20px; color: #666; line-height: 1.5;">
                Access all <b>Mathematics</b> and <b>English</b> sets (6-10) and support your learning journey!
            </p>
            <button class="btn orange-btn" onclick="requestPremium()">Upgrade via WhatsApp</button>
            <button onclick="closePremiumModal()" style="background:none; border:none; color:#999; cursor:pointer; text-decoration:underline; margin-top:15px; width:100%;">Maybe Later</button>
        </div>
    </div>

    <div class="container wide-container">
        <!-- HEADER -->
        <header class="app-header">
            <h1>🏫 School Hub</h1>
            <div class="header-right">
                <span id="user-badge" class="user-badge">Explorer</span>
                <a href="index.html" class="home-icon-btn">🏠</a>
            </div>
        </header>

        <div class="library-layout">
            <!-- SIDEBAR -->
            <div class="sidebar">
                <button id="tab-tuition" class="tab-btn active" onclick="openTab('tuition', this)">🎓 Tuition</button>
                <button id="tab-sifir" class="tab-btn" onclick="openTab('sifir', this)">🔢 Sifir Master</button>
                <button id="tab-train" class="tab-btn" onclick="openTab('train', this)">🧠 Train Sifir</button>
                <button class="tab-btn tab-btn-disabled">🧪 STEM (Soon)</button>
            </div>

            <div class="main-content">
                <!-- 1. TUITION SECTION -->
                <div id="tuition" class="category-content" style="display: block;">
                    <div class="filter-bar">
                        <button class="filter-btn active" onclick="filterGrade('all', this)">All</button>
                        <button class="filter-btn" onclick="filterGrade('4', this)">Std 4</button>
                        <button class="filter-btn" onclick="filterGrade('5', this)">Std 5</button>
                        <button class="filter-btn" onclick="filterGrade('6', this)">Std 6</button>
                    </div>
                    <div id="matrix-container"></div>
                </div>

                <!-- 2. SIFIR MASTER SECTION -->
                <div id="sifir" class="category-content" style="display: none;">
                    <div class="subject-card" style="text-align: center; margin-top: 0;">
                        <h2 style="margin-bottom: 5px; font-size: 1.1rem;">🔢 Sifir Master</h2>
                        <p id="sifir-highscore" style="font-weight: bold; color: #f39c12; margin-bottom: 15px; font-size: 0.9rem;">Best Score: 0/10</p>
                        <a href="sifir.html" class="btn blue-btn" style="margin: 0 auto; max-width: 300px;">Start Challenge 🚀</a>
                    </div>
                    <h3 style="text-align: center; margin: 15px 0 10px; color: #2c3e50; font-size: 0.9rem;">🏆 Global Top 10</h3>
                    <div style="background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden;">
                        <table class="lb-table"><tbody id="leaderboard-body"></tbody></table>
                    </div>
                </div>

                <!-- 3. TRAIN SIFIR SECTION -->
                <div id="train" class="category-content" style="display: none;">
                    <h2 style="text-align: center; margin-bottom: 5px; font-size: 1.1rem;">🧠 Memorization Training</h2>
                    <p style="text-align: center; color: #666; font-size: 0.85rem; margin-bottom: 15px;">Master each table from 1 to 12</p>
                    <div class="sifir-grid" id="train-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user') || "Explorer";

        // Display current user's name (and star if premium)
        async function updateBadge() {
            const userDoc = await getDoc(doc(db, "users", kidName));
            const isPremium = userDoc.exists() ? userDoc.data().isPremium : false;
            document.getElementById('user-badge').innerHTML = `👤 ${kidName}${isPremium ? ' <span style="color:#f1c40f">⭐</span>' : ''}`;
            return isPremium;
        }

        const subjects = [
            { id: 'math', name: 'Mathematics (DLP)', color: '#4a90e2', sets: 10 }, 
            { id: 'sci', name: 'Science (DLP)', color: '#0097a7', sets: 3 }, 
            { id: 'eng', name: 'English Language', color: '#f39c12', sets: 10 }
        ];

        async function generateHub() {
            const isPremium = await updateBadge();
            const container = document.getElementById('matrix-container');
            const trainGrid = document.getElementById('train-grid');
            const lbBody = document.getElementById('leaderboard-body');
            
            let userScores = {}; let masterDataList = [];

            try {
                const userDoc = await getDoc(doc(db, "users", kidName));
                if (userDoc.exists()) userScores = userDoc.data().scores || {};

                // Rankings logic
                const userProfiles = await getDocs(collection(db, "users"));
                userProfiles.forEach(uDoc => {
                    const data = uDoc.data();
                    if (data.scores?.['sifir-master-obj']) masterDataList.push({ name: uDoc.id, ...data.scores['sifir-master-obj'] });
                    else if (data.scores?.['sifir-master']) masterDataList.push({ name: uDoc.id, score: data.scores['sifir-master'], time: 999 });
                });
                const newAttempts = await getDocs(query(collection(db, "sifir_scores"), limit(100)));
                newAttempts.forEach(aDoc => masterDataList.push(aDoc.data()));
                
                masterDataList.sort((a, b) => b.score - a.score || a.time - b.time);
                lbBody.innerHTML = '';
                masterDataList.slice(0, 10).forEach((entry, index) => {
                    const timeDisplay = entry.time === 999 ? "N/A" : entry.time + "s";
                    lbBody.innerHTML += `<tr><td style="width:40px;">#${index+1}</td><td style="text-align:left;">${entry.name}</td><td>${entry.score}/10</td><td>${timeDisplay}</td></tr>`;
                });
                if(userScores['sifir-master'] !== undefined) document.getElementById('sifir-highscore').innerText = `Best Score: ${userScores['sifir-master']}/10`;
            } catch (e) { console.error(e); }

            // GRID BUILD: TRAIN
            trainGrid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const isMastered = userScores[`train-${i}`] === 12;
                trainGrid.innerHTML += `<a href="train-engine.html?n=${i}" class="train-card ${isMastered ? 'mastered' : ''}">Sifir ${i}${isMastered ? '<span class="mastered-label">✅ Mastered</span>' : ''}</a>`;
            }

            // GRID BUILD: TUITION
            container.innerHTML = '';
            subjects.forEach(sub => {
                let html = `<div class="subject-card"><h3 style="color:${sub.color}; font-size: 0.95rem; margin-bottom: 8px;">${sub.name}</h3>`;
                [4, 5, 6].forEach(lvl => {
                    html += `<div class="grade-row grade-block-${lvl}"><div class="grade-label">Std ${lvl}</div><div class="set-group">`;
                    for (let setNum = 1; setNum <= sub.sets; setNum++) {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = userScores[scoreKey] || 0;
                        
                        // PREMIUM LOCKING
                        let isLocked = false;
                        if (!isPremium) {
                            if (sub.id === 'math' && setNum >= 6) isLocked = true;
                            if (sub.id === 'eng' && setNum >= 6) isLocked = true;
                        }

                        if (isLocked) html += `<div class="set-circle locked" onclick="window.openPremiumModal()"><span>🔒</span></div>`;
                        else html += `<a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" class="set-circle ${bestScore >= 5 ? 'done' : ''}" style="background-color: ${sub.color}"><span>${setNum}</span>${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}</a>`;
                    }
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        window.openPremiumModal = () => document.getElementById('premium-modal').style.display = 'flex';
        window.closePremiumModal = () => document.getElementById('premium-modal').style.display = 'none';
        
        window.requestPremium = () => {
            const phone = "60122750485"; // CHANGE TO YOUR PHONE
            const msg = encodeURIComponent(`Hi! I want to upgrade my explorer account "${kidName}" to Premium on AF Hub.`);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }

        window.openTab = (categoryName, element) => {
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(categoryName).style.display = "block";
            if(element) element.classList.add("active");
        }

        window.filterGrade = (lvl, btn) => {
            const btns = document.getElementsByClassName('filter-btn');
            for(let b of btns) b.style.background = "white", b.style.color = "#555";
            btn.style.background = "#1a1a2e", btn.style.color = "white";
            const allRows = document.getElementsByClassName('grade-row');
            for(let row of allRows) {
                if (lvl === 'all') row.style.display = 'flex';
                else row.style.display = row.classList.contains(`grade-block-${lvl}`) ? 'flex' : 'none';
            }
        };

        generateHub();
    </script>
</body>
</html>
