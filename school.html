<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub - AF Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container wide-container">
        <div style="padding: 20px; border-bottom: 2px solid #eee; text-align: center;">
            <h1 style="margin: 0; font-size: 1.8rem;">🏫 School Hub</h1>
        </div>

        <div class="library-layout">
            <div class="sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'tuition')">🎓 Tuition</button>
                <button class="tab-btn" onclick="openTab(event, 'stem')">🧪 STEM Facts</button>
                <div style="flex-grow: 1; min-height: 20px;"></div>
                <a href="index.html" class="tab-btn" style="text-decoration:none; color:#e74c3c; text-align:center;">🏠 Home</a>
            </div>

            <div class="main-content">
                <!-- TUITION SECTION -->
                <div id="tuition" class="category-content">
                    <h2 style="font-size: 1.2rem; margin-bottom: 20px; text-align: center; color: #666;">Choose a Study Set</h2>
                    <div id="matrix-container">
                        <p style="text-align:center;">Syncing with cloud...</p>
                    </div>
                </div>

                <!-- STEM SECTION -->
                <div id="stem" class="category-content" style="display:none;">
                    <h2 style="margin-bottom: 20px;">🧪 STEM Explorer</h2>
                    <a href="book-space.html" class="btn green-btn">🚀 Mission to Mars</a>
                    <a href="buku-tenaga-solar.html" class="btn green-btn">☀️ Tenaga Solar</a>
                    <a href="buku-tenaga-air.html" class="btn green-btn">🌊 Kuasa Empangan</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user');

        const subjects = [
            { id: 'math', name: 'Mathematics (DLP)', color: '#4a90e2' },
            { id: 'sci', name: 'Science (DLP)', color: '#0097a7' }, // Changed to Teal
            { id: 'eng', name: 'English Language', color: '#f39c12' }
        ];

        async function generateMatrix() {
            const container = document.getElementById('matrix-container');
            
            let scores = {};
            if (kidName) {
                try {
                    const userDoc = await getDoc(doc(db, "users", kidName));
                    if (userDoc.exists()) {
                        scores = userDoc.data().scores || {};
                    }
                } catch (e) { console.error(e); }
            }

            container.innerHTML = '';
            subjects.forEach(sub => {
                let html = `<div class="subject-card">
                    <h3 style="color:${sub.color}; font-size: 1.1rem; margin-bottom: 10px;">${sub.name}</h3>`;
                
                [4, 5, 6].forEach(lvl => {
                    html += `<div class="grade-row">
                        <div class="grade-label">Std ${lvl}</div>
                        <div class="set-group">`;
                    
                    [1, 2, 3].forEach(setNum => {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = scores[scoreKey] || 0;
                        const isDone = bestScore >= 5;
                        const doneClass = isDone ? 'done' : '';
                        
                        html += `
                            <a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" 
                               class="set-circle ${doneClass}" 
                               style="background-color: ${sub.color}">
                               ${setNum}
                               ${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}
                            </a>`;
                    });
                    
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        window.openTab = (evt, categoryName) => {
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) { contents[i].style.display = "none"; }
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            document.getElementById(categoryName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        generateMatrix();
    </script>
</body>
</html>
