        let currentQ = 0;
        let score = 0;
        let questions = questionBank[sub][lvl][setNum];

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('stats').innerText = `Question ${currentQ + 1} of 10 | Score: ${score}`;
            document.getElementById('question').innerText = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                list.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            const btns = document.getElementsByClassName('option-btn');
            for(let b of btns) b.disabled = true;
            if(idx === questions[currentQ].c) {
                btn.classList.add('correct'); score++;
            } else {
                btn.classList.add('wrong'); btns[questions[currentQ].c].classList.add('correct');
            }
            setTimeout(() => {
                currentQ++;
                if(currentQ < 10) showQuestion();
                else showResult();
            }, 1000);
        }

        function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/10`;

            if (kidName && hubData.profiles[kidName]) {
                if (!hubData.profiles[kidName].scores) hubData.profiles[kidName].scores = {};
                const scoreKey = `${sub}-${lvl}-${setNum}`;
                const previousBest = hubData.profiles[kidName].scores[scoreKey] || 0;
                if (score > previousBest) {
                    hubData.profiles[kidName].scores[scoreKey] = score;
                    localStorage.setItem('hubData', JSON.stringify(hubData));
                }
            }
            document.getElementById('feedback').innerText = score > 7 ? `Amazing job, ${kidName}!` : `Keep trying, ${kidName}!`;
        }

        showQuestion();
