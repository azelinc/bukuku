        // --- ENGINE LOGIC ---
        let currentQ = 0;
        let score = 0;
        let questions = questionBank[sub][lvl][setNum];

        function showQuestion() {
            if (!questions || !questions[currentQ]) {
                document.getElementById('question').innerText = "Question data error. Please return to the menu.";
                return;
            }
            const q = questions[currentQ];
            document.getElementById('stats').innerText = `Question ${currentQ + 1} of 10 | Score: ${score}`;
            document.getElementById('question').innerText = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                list.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            const btns = document.getElementsByClassName('option-btn');
            for(let b of btns) b.disabled = true;
            if(idx === questions[currentQ].c) {
                btn.classList.add('correct'); score++;
            } else {
                btn.classList.add('wrong'); btns[questions[currentQ].c].classList.add('correct');
            }
            setTimeout(() => {
                currentQ++;
                if(currentQ < 10) showQuestion();
                else showResult();
            }, 1000);
        }

        async function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/10`;

            const status = document.getElementById('sync-status');
            status.innerText = "Syncing with cloud...";

            if (kidName) {
                try {
                    const userRef = doc(db, "users", kidName);
                    const userDoc = await getDoc(userRef);
                    let currentScores = {};
                    if (userDoc.exists()) currentScores = userDoc.data().scores || {};

                    const scoreKey = `${sub}-${lvl}-${setNum}`; 
                    const previousBest = currentScores[scoreKey] || 0;

                    if (score > previousBest) {
                        currentScores[scoreKey] = score;
                        await setDoc(userRef, { scores: currentScores }, { merge: true });
                        status.innerText = "✅ Cloud Sync Complete!";
                    } else {
                        status.innerText = "✅ Cloud Sync Complete!";
                    }
                } catch (e) {
                    console.error("Cloud error:", e);
                    status.innerText = "❌ Sync Failed.";
                }
            }

            document.getElementById('feedback').innerText = score >= 5 ? `Amazing job, ${kidName}! You passed!` : `Don't give up, ${kidName}! Practice makes perfect.`;
        }

        showQuestion();
