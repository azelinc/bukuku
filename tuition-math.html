<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuiz Matematik - AF Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-box { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; border: 2px solid #eee; }
        .q-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: white; border: 2px solid #4a90e2; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { background: #eefbff; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="level-title">Matematik Darjah ?</h1>
        <p id="progress">Soalan 1 dari 10</p>

        <div class="quiz-box" id="quiz-area">
            <div id="question" class="q-text">Sila tunggu...</div>
            <div id="options-list"></div>
        </div>

        <div id="result-area" style="display:none;">
            <h2 id="final-score">Skor: 0/10</h2>
            <p id="feedback"></p>
            <a href="storybook.html" class="btn blue-btn">Selesai</a>
        </div>
    </div>

    <script>
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { current: "Explorer" };
        const kidName = hubData.current;
        
        // Get Level from URL
        const urlParams = new URLSearchParams(window.location.search);
        const level = urlParams.get('level') || "4";
        document.getElementById('level-title').innerText = `Matematik Darjah ${level}`;

        // Questions Database
        const db = {
            "4": [
                { q: "Apakah nilai tempat bagi digit 5 dalam 45,210?", a: ["Ribu", "Puluh Ribu", "Ratus", "Sa"], c: 0 },
                { q: "Bundarkan 12,384 kepada ribu terdekat.", a: ["12,000", "12,400", "13,000", "10,000"], c: 0 },
                { q: "3/4 + 1/4 = ?", a: ["1/2", "4/8", "1", "1/4"], c: 2 },
                { q: "50,000 - 12,500 = ?", a: ["37,500", "38,500", "47,500", "35,000"], c: 0 },
                { q: "Tukarkan 0.7 kepada peratus.", a: ["7%", "70%", "0.7%", "700%"], c: 1 },
                { q: "RM 100 - RM 45.50 = ?", a: ["RM 54.50", "RM 55.50", "RM 64.50", "RM 44.50"], c: 0 },
                { q: "2 jam 15 minit bersamaan berapa minit?", a: ["120 minit", "135 minit", "150 minit", "215 minit"], c: 1 },
                { q: "Sebuah segi empat sama mempunyai sisi 5cm. Berapakah luasnya?", a: ["20cm²", "10cm²", "25cm²", "15cm²"], c: 2 },
                { q: "Berapakah bilangan hari dalam setahun lompat?", a: ["365", "364", "366", "360"], c: 2 },
                { q: "80 ÷ 5 = ?", a: ["14", "16", "18", "12"], c: 1 }
            ],
            "5": [
                { q: "Tukarkan 1 2/5 kepada pecahan tak wajar.", a: ["3/5", "7/5", "12/5", "5/7"], c: 1 },
                { q: "40% daripada 200 ialah...", a: ["40", "60", "80", "100"], c: 2 },
                { q: "Hitung purata bagi 10, 20 dan 30.", a: ["15", "20", "25", "60"], c: 1 },
                { q: "1.25 liter + 0.5 liter = (dalam ml)", a: ["1750ml", "1255ml", "1500ml", "175ml"], c: 0 },
                { q: "Manakah nombor perdana?", a: ["9", "15", "17", "21"], c: 2 },
                { q: "Cari luas segi tiga dengan tapak 6cm dan tinggi 4cm.", a: ["24cm²", "10cm²", "12cm²", "8cm²"], c: 2 },
                { q: "Tukarkan 14:00 jam kepada sistem 12 jam.", a: ["2:00 a.m.", "12:00 p.m.", "2:00 p.m.", "4:00 p.m."], c: 2 },
                { q: "Hitung 125 x 100 ÷ 10.", a: ["1250", "125", "12500", "12.5"], c: 0 },
                { q: "RM 5000 + RM 120.50 =", a: ["RM 5120.50", "RM 5012.50", "RM 6200.50", "RM 5120.00"], c: 0 },
                { q: "Sebuah kotak ada 12 biji epal. Berapa epal dalam 100 kotak?", a: ["120", "1200", "12000", "12"], c: 1 }
            ],
            "6": [
                { q: "Apakah nisbah 3 kepada 5?", a: ["3:5", "5:3", "3/5", "35"], c: 0 },
                { q: "Sebuah kereta bergerak 120km dalam 2 jam. Berapakah kelajuannya?", a: ["60km/j", "240km/j", "120km/j", "50km/j"], c: 0 },
                { q: "Harga kos RM80, harga jual RM100. Berapakah peratus untung?", a: ["20%", "25%", "80%", "10%"], c: 1 },
                { q: "Nyatakan 0.05 juta dalam nombor bulat.", a: ["5,000", "50,000", "500,000", "500"], c: 1 },
                { q: "Cari median bagi data: 2, 5, 8, 10, 12.", a: ["5", "8", "10", "12"], c: 1 },
                { q: "10 - 2.356 =", a: ["7.644", "8.644", "7.744", "8.744"], c: 0 },
                { q: "Berapakah sudut bagi satu putaran lengkap?", a: ["90°", "180°", "360°", "270°"], c: 2 },
                { q: "Tukarkan 3.5 kg kepada gram.", a: ["350g", "3500g", "35000g", "35g"], c: 1 },
                { q: "Satu dekad bersamaan berapa tahun?", a: ["100", "50", "10", "12"], c: 2 },
                { q: "Hitung isi padu kubus dengan sisi 3cm.", a: ["9cm³", "12cm³", "27cm³", "18cm³"], c: 2 }
            ]
        };

        let currentQ = 0;
        let score = 0;
        let questions = db[level];

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('progress').innerText = `Soalan ${currentQ + 1} dari 10`;
            document.getElementById('question').innerText = q.q;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                list.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            const btns = document.getElementsByClassName('option-btn');
            for(let b of btns) b.disabled = true;
            
            if(idx === questions[currentQ].c) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                btns[questions[currentQ].c].classList.add('correct');
            }

            setTimeout(() => {
                currentQ++;
                if(currentQ < 10) showQuestion();
                else showResult();
            }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = `Skor: ${score}/10`;
            
            let comment = score > 7 ? "Syabas! Anda memang pakar Matematik!" : "Bagus! Teruskan usaha dan banyakkan latihan.";
            document.getElementById('feedback').innerText = `${comment} Tahniah, ${kidName}!`;
        }

        showQuestion();
    </script>
</body>
</html>
