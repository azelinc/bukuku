<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sifir Master - AF Hub</title>
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">
    <style>
        .quiz-box { text-align: center; background: #fff; padding: 25px; border-radius: 20px; margin: 20px 0; border: 3px solid #eee; }
        .q-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; color: #2c3e50; }
        .option-btn { display: block; width: 100%; padding: 16px; margin: 12px 0; background: #f8f9fa; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.5rem; font-weight: bold; transition: 0.2s; color: #444; }
        .option-btn:hover:not(:disabled) { background: #f0f7ff; border-color: #4a90e2; }
        .correct { background: #d4edda !important; color: #155724 !important; border-color: #2ecc71 !important; border-width: 3px; }
        .wrong { background: #f8d7da !important; color: #721c24 !important; border-color: #e74c3c !important; border-width: 3px; }
        .timer-wrapper { width: 100%; background: #eee; height: 16px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        #timer-bar { height: 100%; width: 100%; transition: width 1s linear, background-color 0.3s ease; }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .timer-blink { animation: blink-red 0.5s infinite; }
        #stats { font-weight: bold; margin-bottom: 8px; color: #666; font-size: 1rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="quiz-title">🔢 Sifir Challenge</h1>
        <div id="stats"><span>Quest <span id="q-num">1</span>/10</span><span>Score: <span id="current-score">0</span></span></div>
        <div class="timer-wrapper"><div id="timer-bar" style="background-color: #2ecc71;"></div></div>
        <div class="quiz-box" id="quiz-area">
            <div id="question" class="q-text">? × ?</div>
            <div id="options-list"></div>
        </div>
        <div id="result-area" style="display:none; padding: 20px;">
            <h2 id="final-score" style="font-size: 3rem; color: #f39c12;">0/10</h2>
            <p id="time-taken-label" style="font-weight: bold; color: #666; margin-bottom: 10px;"></p>
            <p id="feedback" style="font-size: 1.2rem; margin-bottom: 30px; line-height: 1.5;"></p>
            <div id="sync-status" style="font-size: 0.8rem; color: #999; margin-bottom: 15px;"></div>
            <button class="btn blue-btn" onclick="location.reload()">New Set 🔄</button>
            
            <!-- FIXED LINK: Returns to Sifir Tab -->
            <a href="school.html?tab=sifir" class="btn green-btn">Back to Hub</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user') || "Explorer";

        let currentQ = 0; let score = 0; let timerInterval; let timeLeft = 15;
        let currentCorrectAns;
        let gameStartTime;

        function generateQuestion() {
            if (currentQ === 0) gameStartTime = Date.now();
            const a = Math.floor(Math.random() * 11) + 2; 
            const b = Math.floor(Math.random() * 11) + 2;
            const ans = a * b;
            currentCorrectAns = ans;
            let options = [ans];
            while(options.length < 4) {
                let wrong = (a + (Math.random() > 0.5 ? 1 : -1)) * (b + (Math.random() > 0.5 ? 1 : -1));
                if(wrong < 1 || options.includes(wrong)) wrong = ans + Math.floor(Math.random() * 10) - 5;
                if(wrong > 0 && !options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);
            document.getElementById('question').innerText = `${a} × ${b} = ?`;
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => check(opt, btn);
                list.appendChild(btn);
            });
            resetAndStartTimer();
        }

        function resetAndStartTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            updateTimerBar();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerBar();
                if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeOut(); }
            }, 1000);
        }

        function updateTimerBar() {
            const bar = document.getElementById('timer-bar');
            bar.style.width = (timeLeft / 15) * 100 + "%";
            bar.classList.remove('timer-blink');
            if (timeLeft > 10) bar.style.backgroundColor = "#2ecc71";
            else if (timeLeft > 5) bar.style.backgroundColor = "#f1c40f";
            else { bar.style.backgroundColor = "#e74c3c"; bar.classList.add('timer-blink'); }
        }

        function check(chosen, btn) {
            clearInterval(timerInterval);
            const btns = document.getElementsByClassName('option-btn');
            for(let b of btns) {
                b.disabled = true;
                if(parseInt(b.innerText) === currentCorrectAns) b.classList.add('correct');
            }
            if(chosen === currentCorrectAns) { score++; }
            else { btn.classList.add('wrong'); }
            document.getElementById('current-score').innerText = score;
            setTimeout(next, 1500);
        }

        function handleTimeOut() {
            const btns = document.getElementsByClassName('option-btn');
            for(let b of btns) {
                b.disabled = true;
                if(parseInt(b.innerText) === currentCorrectAns) b.classList.add('correct');
            }
            setTimeout(next, 2000);
        }

        function next() {
            currentQ++;
            if(currentQ < 10) {
                document.getElementById('q-num').innerText = currentQ + 1;
                generateQuestion();
            } else finish();
        }

        async function finish() {
            const totalTime = ((Date.now() - gameStartTime) / 1000).toFixed(1);
            clearInterval(timerInterval);
            document.getElementById('quiz-area').style.display = 'none';
            document.querySelector('.timer-wrapper').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/10`;
            document.getElementById('time-taken-label').innerText = `Time: ${totalTime}s`;
            
            const sync = document.getElementById('sync-status');
            sync.innerText = "Saving result...";

            try {
                // Save attempt to global collection
                await addDoc(collection(db, "sifir_scores"), {
                    name: kidName,
                    score: score,
                    time: parseFloat(totalTime),
                    timestamp: serverTimestamp()
                });

                // Update personal best in user doc
                const userRef = doc(db, "users", kidName);
                const userDoc = await getDoc(userRef);
                let scores = userDoc.exists() ? userDoc.data().scores || {} : {};
                if (score > (scores['sifir-master'] || 0)) {
                    scores['sifir-master'] = score;
                    await setDoc(userRef, { scores: scores }, { merge: true });
                }
                sync.innerText = "✅ Result Saved!";
            } catch (e) {
                sync.innerText = "❌ Sync failed.";
            }
            
            document.getElementById('feedback').innerText = score >= 8 ? `Amazing, ${kidName}!` : `Keep trying, ${kidName}!`;
        }
        generateQuestion();
    </script>
</body>
</html>
