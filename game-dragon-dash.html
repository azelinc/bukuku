<!DOCTYPE html>
<html>
<head>
    <title>Dragon Dash</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #game-window {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(#1a1a2e, #16213e);
            border-radius: 20px;
            overflow: hidden; /* Keeps falling items inside */
            cursor: none; /* Hides mouse to use the dragon instead */
        }
        #player {
            position: absolute;
            bottom: 20px;
            left: 50%;
            font-size: 50px;
            transform: translateX(-50%);
            transition: 0.1s linear;
        }
        .falling-item {
            position: absolute;
            font-size: 30px;
            top: -50px;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐉 Dragon Dash 🐉</h1>
        <div id="score-board">Stars Caught: 0</div>
        
        <div id="game-window">
            <div id="player">🐉</div>
        </div>

        <p>Move your mouse or finger to catch stars! Avoid fire! 🔥</p>
        <a href="games.html" class="btn red">🔙 Back to Games</a>
    </div>

    <script>
        const gameWindow = document.getElementById('game-window');
        const player = document.getElementById('player');
        const scoreBoard = document.getElementById('score-board');
        
        let score = 0;
        let gameActive = true;

        // Move player with mouse or touch
        gameWindow.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            let rect = gameWindow.getBoundingClientRect();
            let x = e.clientX - rect.left;
            // Keep dragon inside the box
            if (x > 25 && x < rect.width - 25) {
                player.style.left = x + 'px';
            }
        });

        function spawnItem() {
            if (!gameActive) return;

            const item = document.createElement('div');
            item.className = 'falling-item';
            
            // Randomly choose Star (good) or Fire (bad)
            const isStar = Math.random() > 0.3;
            item.innerText = isStar ? '⭐' : '🔥';
            
            // Random horizontal position
            item.style.left = Math.random() * (gameWindow.offsetWidth - 30) + 'px';
            gameWindow.appendChild(item);

            let fallPos = -50;
            const fallSpeed = 3 + (score / 5); // Gets faster as you score!

            const fallInterval = setInterval(() => {
                fallPos += fallSpeed;
                item.style.top = fallPos + 'px';

                // Check for collision with player
                const itemRect = item.getBoundingClientRect();
                const playerRect = player.getBoundingClientRect();

                if (
                    itemRect.bottom >= playerRect.top &&
                    itemRect.right >= playerRect.left &&
                    itemRect.left <= playerRect.right
                ) {
                    if (isStar) {
                        score++;
                        scoreBoard.innerText = "Stars Caught: " + score;
                        item.remove();
                        clearInterval(fallInterval);
                    } else {
                        gameOver();
                        clearInterval(fallInterval);
                    }
                }

                // Remove if it falls past bottom
                if (fallPos > gameWindow.offsetHeight) {
                    item.remove();
                    clearInterval(fallInterval);
                }
            }, 20);
        }

function gameOver() {
    gameActive = false;
    
    // 1. Load the big data object
    let hubData = JSON.parse(localStorage.getItem('hubData'));
    let currentUser = hubData.current;
    let oldScore = hubData.profiles[currentUser] || 0;

    let message = `Game Over, ${currentUser}!\nYour Score: ${score}`;

    // 2. Check if this specific kid got a new high score
    if (score > oldScore) {
        hubData.profiles[currentUser] = score;
        localStorage.setItem('hubData', JSON.stringify(hubData));
        message += `\nNEW PERSONAL BEST! 🎉`;
    } else {
        message += `\nPersonal Best: ${oldScore}`;
    }

    alert(message);
    location.reload(); 
}

        // Spawn a new item every second
        setInterval(spawnItem, 1000);
    </script>
</body>
</html>
