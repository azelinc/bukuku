<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AF Adventure Hub</title>
    
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        .profile-row { display: flex; align-items: center; gap: 10px; max-width: 400px; margin: 10px auto; width: 100%; }
        .profile-btn { flex: 1; margin: 0 !important; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .admin-controls { display: flex; gap: 5px; }
        .del-btn { background: #ff7675; border: none; color: white; padding: 12px; border-radius: 12px; cursor: pointer; display: none; min-width: 45px; }
        .prem-toggle-btn { background: #eee; border: none; color: #aaa; padding: 12px; border-radius: 12px; cursor: pointer; display: none; min-width: 45px; font-size: 1.2rem; }
        .prem-toggle-btn.is-premium { background: #f1c40f; color: white; }
        .premium-star { color: #f1c40f; }
        #loading-retry { display: none; margin-top: 20px; color: #4a90e2; text-decoration: underline; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER (Visible once logged in) -->
        <header id="main-header" class="app-header" style="display: none;">
            <h1>AF Hub</h1>
            <div class="header-right">
                <span id="user-badge" class="user-badge">Explorer</span>
            </div>
        </header>

        <!-- 0. LOADING SCREEN -->
        <div id="loading-screen" style="padding: 80px 20px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 20px;">🚀</div>
            <h1>Loading...</h1>
            <p id="loading-status">Connecting to Adventure Cloud</p>
            <button id="loading-retry" onclick="location.reload()">Refresh Page</button>
        </div>

        <!-- 1. PROFILE SELECTION -->
        <div id="profile-selection" style="display: none;">
            <h1 style="background:none; color:#333; text-align:center; padding:30px 0;">👋 Welcome!</h1>
            <div class="main-menu-padding">
                <p id="selection-sub" style="margin-bottom: 20px; text-align:center; color: #666;">Who is playing today?</p>
                <div id="profile-list"></div>
                
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn green-btn" onclick="showNewUserForm()">+ New Explorer</button>
                    <button id="manage-toggle" onclick="adminLogin()" style="background:none; border:none; color:#ddd; cursor:pointer; font-size: 0.7rem; margin: 20px auto;">Admin</button>
                </div>
            </div>
        </div>

        <!-- 2. NEW USER FORM -->
        <div id="name-setup" style="display: none;">
            <h1 style="background:none; color:#333; text-align:center; padding:30px 0;">✨ New Quest</h1>
            <div class="main-menu-padding">
                <p style="margin-bottom: 15px; color: #666; text-align: center;">Enter your name to start:</p>
                <input type="text" id="user-name-input" placeholder="Your name..." style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #eee; font-size: 1.3rem; margin-bottom: 10px; text-align: center; outline: none; font-family: inherit;">
                <button class="btn blue-btn" id="save-name-btn">Start! 🚀</button>
                <button onclick="initHub()" style="margin-top: 15px; background:none; border:none; color:#999; cursor:pointer; text-decoration: underline; width:100%;">Cancel</button>
            </div>
        </div>

        <!-- 3. MAIN MENU -->
        <div id="main-menu" style="display: none;">
            <div class="main-menu-padding">
                <p style="margin-bottom:20px; color: #666; text-align:center; font-weight:bold;">Ready for today's lesson?</p>
                <div class="nav-grid">
                    <a href="school.html" class="btn green-btn">🏫 School Hub</a>
                    <div class="btn btn-disabled">📖 Library Coming Soon</div>
                    <div class="btn btn-disabled">🎮 Games Coming Soon</div>
                </div>
                <button onclick="switchUser()" style="margin-top:40px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%; max-width: 400px;">👤 Switch Profile</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, getDoc, collection, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loading = document.getElementById('loading-screen');
        const selection = document.getElementById('profile-selection');
        const setup = document.getElementById('name-setup');
        const menu = document.getElementById('main-menu');
        const header = document.getElementById('main-header');
        
        let isManageMode = false;
        const ADMIN_PIN = "9988";

        // Show retry button if loading takes more than 6 seconds
        setTimeout(() => {
            if(loading.style.display !== 'none') {
                document.getElementById('loading-retry').style.display = 'inline-block';
                document.getElementById('loading-status').innerText = "Cloud is taking a while...";
            }
        }, 6000);

        async function initHub() {
            console.log("System: Initializing Hub...");
            loading.style.display = 'block';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'none';
            header.style.display = 'none';

            const activeUser = localStorage.getItem('fb_current_user');
            
            if (activeUser) {
                console.log("System: Attempting to log in as", activeUser);
                const success = await renderMainMenu(activeUser);
                if (!success) {
                    console.log("System: Local user not found in Cloud. Resetting...");
                    localStorage.removeItem('fb_current_user');
                    await showProfileSelection();
                }
            } else {
                console.log("System: No local user found. Showing selection.");
                await showProfileSelection();
            }
        }

        async function showProfileSelection() {
            loading.style.display = 'none';
            selection.style.display = 'block';
            const list = document.getElementById('profile-list');
            list.innerHTML = '<p style="color:#999">Fetching adventurers...</p>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                list.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    const name = docSnap.id;
                    const isPremium = userData.isPremium === true;

                    const row = document.createElement('div');
                    row.className = "profile-row";
                    const btn = document.createElement('button');
                    btn.className = "btn blue-btn profile-btn";
                    btn.innerHTML = `👤 ${name}${isPremium ? ' <span class="premium-star">⭐</span>' : ''}`;
                    btn.onclick = () => selectProfile(name);

                    const ctrl = document.createElement('div');
                    ctrl.className = "admin-controls";
                    const premBtn = document.createElement('button');
                    premBtn.className = "prem-toggle-btn" + (isPremium ? " is-premium" : "");
                    premBtn.innerHTML = "⭐";
                    premBtn.style.display = isManageMode ? "block" : "none";
                    premBtn.onclick = (e) => { e.stopPropagation(); togglePremium(name, isPremium); };

                    const delBtn = document.createElement('button');
                    delBtn.className = "del-btn";
                    delBtn.innerHTML = "🗑️";
                    delBtn.style.display = isManageMode ? "block" : "none";
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteProfile(name); };

                    ctrl.appendChild(premBtn);
                    ctrl.appendChild(delBtn);
                    row.appendChild(btn);
                    row.appendChild(ctrl);
                    list.appendChild(row);
                });
                if (querySnapshot.empty) list.innerHTML = '<p style="color:#999">No explorers yet.</p>';
            } catch (e) { 
                console.error("Firebase Fetch Error:", e);
                list.innerHTML = '<p style="color:red">Error connecting to Cloud. Please refresh.</p>';
            }
        }

        window.adminLogin = () => {
            const entry = prompt("Enter Admin PIN:");
            if (entry === ADMIN_PIN) {
                isManageMode = true;
                document.getElementById('selection-sub').innerText = "⚠️ ADMIN MODE";
                document.getElementById('selection-sub').style.color = "red";
                showProfileSelection();
            }
        }

        async function togglePremium(name, currentStatus) {
            try {
                const userRef = doc(db, "users", name);
                await updateDoc(userRef, { isPremium: !currentStatus });
                await showProfileSelection();
            } catch (e) { console.error(e); }
        }

        async function deleteProfile(name) {
            if (confirm(`Delete explorer "${name}"?`)) {
                await deleteDoc(doc(db, "users", name));
                await showProfileSelection();
            }
        }

        document.getElementById('save-name-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if (name) {
                const btn = document.getElementById('save-name-btn');
                btn.innerText = "Syncing...";
                btn.disabled = true;
                try {
                    await setDoc(doc(db, "users", name), { lastLogin: new Date(), isPremium: false }, { merge: true });
                    selectProfile(name);
                } catch (e) {
                    alert("Cloud save failed. Check permissions.");
                    btn.innerText = "Start! 🚀";
                    btn.disabled = false;
                }
            }
        };

        function selectProfile(name) {
            localStorage.setItem('fb_current_user', name);
            renderMainMenu(name);
        }

        async function renderMainMenu(name) {
            try {
                const userDoc = await getDoc(doc(db, "users", name));
                if (!userDoc.exists()) return false; // Fail if doc missing

                const isPremium = userDoc.data().isPremium === true;
                loading.style.display = 'none';
                selection.style.display = 'none';
                setup.style.display = 'none';
                menu.style.display = 'block';
                header.style.display = 'flex';
                document.getElementById('user-badge').innerHTML = `👤 ${name}${isPremium ? ' <span class="premium-star">⭐</span>' : ''}`;
                return true;
            } catch (e) {
                console.error("Menu Render Error:", e);
                return false;
            }
        }

        window.switchUser = () => {
            localStorage.removeItem('fb_current_user');
            isManageMode = false;
            initHub();
        }

        window.initHub = initHub;
        window.showNewUserForm = () => { selection.style.display = 'none'; setup.style.display = 'block'; }
        
        initHub();
    </script>
</body>
</html>
