<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AF Adventure Hub</title>
    
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        .profile-row { display: flex; align-items: center; gap: 10px; max-width: 400px; margin: 10px auto; }
        .profile-btn { flex: 1; margin: 0 !important; }
        .del-btn { background: #ff7675; border: none; color: white; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER (Visible once logged in) -->
        <header id="main-header" class="app-header" style="display: none;">
            <h1>AF Hub</h1>
            <div class="header-right">
                <span id="user-badge" class="user-badge">Explorer</span>
            </div>
        </header>

        <!-- LOADING SCREEN -->
        <div id="loading-screen" style="padding: 80px 20px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 20px;">🚀</div>
            <h1>Loading...</h1>
            <p style="color: #666; margin-top: 10px;">Connecting to Cloud</p>
        </div>

        <!-- PROFILE SELECTION -->
        <div id="profile-selection" style="display: none;">
            <h1 style="background:none; color:#333; text-align:center; padding:30px 0;">👋 Welcome!</h1>
            <div class="main-menu-padding">
                <p id="selection-sub" style="margin-bottom: 20px; text-align:center; color: #666;">Who is playing today?</p>
                <div id="profile-list"></div>
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn green-btn" onclick="showNewUserForm()">+ New Explorer</button>
                    <button id="manage-toggle" onclick="adminLogin()" style="background:none; border:none; color:#ddd; cursor:pointer; font-size: 0.7rem; margin: 20px auto;">Admin</button>
                </div>
            </div>
        </div>

        <!-- NEW USER FORM -->
        <div id="name-setup" style="display: none;">
            <h1 style="background:none; color:#333; text-align:center; padding:30px 0;">✨ New Quest</h1>
            <div class="main-menu-padding">
                <input type="text" id="user-name-input" placeholder="Your name..." style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #eee; font-size: 1.3rem; margin-bottom: 10px; text-align: center; outline: none; font-family: inherit;">
                <button class="btn blue-btn" id="save-name-btn">Start! 🚀</button>
                <button onclick="initHub()" style="margin-top: 15px; background:none; border:none; color:#999; cursor:pointer; text-decoration: underline; width:100%;">Cancel</button>
            </div>
        </div>

        <!-- MAIN MENU -->
        <div id="main-menu" style="display: none;">
            <div class="main-menu-padding">
                <p style="margin-bottom:20px; color: #666; text-align:center; font-weight:bold;">Are you ready for today's lesson?</p>
                
                <div class="nav-grid">
                    <a href="school.html" class="btn green-btn">🏫 School Hub</a>
                    
                    <div class="btn btn-disabled">
                        📖 Library <span class="coming-soon-tag">Coming Soon</span>
                    </div>
                    
                    <div class="btn btn-disabled">
                        🎮 Games <span class="coming-soon-tag">Coming Soon</span>
                    </div>
                </div>
                
                <button onclick="switchUser()" style="margin-top:40px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%;">👤 Switch Profile</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, getDoc, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loading = document.getElementById('loading-screen');
        const selection = document.getElementById('profile-selection');
        const setup = document.getElementById('name-setup');
        const menu = document.getElementById('main-menu');
        const header = document.getElementById('main-header');
        
        let isManageMode = false;
        const ADMIN_PIN = "9988";

        async function initHub() {
            loading.style.display = 'block';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'none';
            header.style.display = 'none';

            const activeUser = localStorage.getItem('fb_current_user');
            if (activeUser) {
                renderMainMenu(activeUser);
            } else {
                await showProfileSelection();
            }
        }

        async function showProfileSelection() {
            loading.style.display = 'none';
            selection.style.display = 'block';
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                querySnapshot.forEach((docSnap) => {
                    const row = document.createElement('div');
                    row.className = "profile-row";
                    const btn = document.createElement('button');
                    btn.className = "btn blue-btn profile-btn";
                    btn.innerHTML = `👤 ${docSnap.id}`;
                    btn.onclick = () => selectProfile(docSnap.id);
                    const delBtn = document.createElement('button');
                    delBtn.className = "del-btn";
                    delBtn.innerHTML = "🗑️";
                    delBtn.style.display = isManageMode ? "block" : "none";
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteProfile(docSnap.id); };
                    row.appendChild(btn); row.appendChild(delBtn);
                    list.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }

        window.adminLogin = () => {
            const entry = prompt("Enter Admin PIN:");
            if (entry === ADMIN_PIN) { isManageMode = true; document.getElementById('selection-sub').innerText = "⚠️ ADMIN MODE"; showProfileSelection(); }
        }

        async function deleteProfile(name) {
            if (confirm(`Delete "${name}"?`)) { await deleteDoc(doc(db, "users", name)); showProfileSelection(); }
        }

        document.getElementById('save-name-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if (name) {
                await setDoc(doc(db, "users", name), { lastLogin: new Date() }, { merge: true });
                selectProfile(name);
            }
        };

        function selectProfile(name) {
            localStorage.setItem('fb_current_user', name);
            renderMainMenu(name);
        }

        function renderMainMenu(name) {
            loading.style.display = 'none';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'block';
            header.style.display = 'flex';
            document.getElementById('user-badge').innerText = `👤 ${name}`;
        }

        window.switchUser = () => {
            localStorage.removeItem('fb_current_user');
            isManageMode = false;
            initHub();
        }

        window.initHub = initHub;
        window.showNewUserForm = () => { selection.style.display = 'none'; setup.style.display = 'block'; }
        initHub();
    </script>
</body>
</html>
