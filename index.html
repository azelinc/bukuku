<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid Adventure Hub</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: #333;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* The Main Menu Styling */
        #main-menu {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 8px solid #ffd700;
        }

        .menu-title { font-size: 36px; color: #2c3e50; margin-bottom: 30px; }

        .big-nav-btn {
            display: block;
            width: 250px;
            margin: 20px auto;
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .blue-btn { background: #4a90e2; }
        .orange-btn { background: #f39c12; }
        .back-btn { background: #e74c3c; padding: 10px 20px; font-size: 14px; margin-top: 20px; color: white; border: none; border-radius: 5px; cursor: pointer; }

        .big-nav-btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* The Game Container (Hidden by default) */
        #game-container { 
            display: none; /* This stays hidden until Storybook is clicked */
            background: #ffffff; 
            width: 90%; 
            max-width: 700px; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center;
            border: 8px solid #ffd700;
        }

        #scene-image { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; margin-bottom: 25px; }
        .choice-btn { background: linear-gradient(135deg, #6e8efb, #a777e3); border: none; color: white; padding: 18px 25px; margin: 10px; border-radius: 50px; cursor: pointer; font-size: 18px; transition: 0.3s; }
    </style>
</head>
<body>

    <!-- SECTION 1: THE LANDING PAGE -->
    <div id="main-menu">
        <h1 class="menu-title">Adventure Hub</h1>
        <button class="big-nav-btn blue-btn" onclick="startStory()">📖 Storybook</button>
        <button class="big-nav-btn orange-btn" onclick="goToGames()">🎮 Games</button>
    </div>

    <!-- SECTION 2: THE STORYBOOK (Same logic as before) -->
    <div id="game-container">
        <img id="scene-image" src="" alt="">
        <h1 id="story-text"></h1>
        <div id="choices"></div>
        <button class="back-btn" onclick="goHome()">🏠 Back to Menu</button>
    </div>

<script>
    // NAVIGATION LOGIC
    function startStory() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        renderScene('start');
    }

    function goToGames() {
        alert("The Games room is currently locked! Check back soon for puzzles and mini-games.");
    }

    function goHome() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('game-container').style.display = 'none';
    }

    // YOUR STORY DATA
    const story = {
        start: {
            text: "You and your friends find a glowing map in the attic. It shows a path to the Star-Mist Mountain, where a dragon has stolen the Queen Fairy's magic wand! Do you go?",
            image: "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&q=80&w=800",
            choices: [
                { text: "Grab your backpack and go!", next: "forest_entrance" },
                { text: "Stay home and eat cookies", next: "home_ending" }
            ]
        },
        forest_entrance: {
            text: "You reach the Whispering Forest. A tiny Fairy named Pip appears. 'Stop!' she squeaks. 'The trees are grumpy today.'",
            image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800",
            choices: [
                { text: "Give them chocolate", next: "fairy_village" },
                { text: "Sing a song", next: "fairy_village" }
            ]
        },
        fairy_village: {
            text: "The Fairy Queen gives you a Magic Blanket to keep the Dragon warm.",
            image: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=800",
            choices: [{ text: "Climb the Mountain", next: "mountain_climb" }]
        },
        mountain_climb: {
            text: "Spark the Dragon is shivering! He's just cold.",
            image: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800",
            choices: [
                { text: "Give him the Blanket", next: "good_ending" },
                { text: "Run away!", next: "start" }
            ]
        },
        good_ending: {
            text: "Spark is happy and warm! He returns the wand. YOU WIN!",
            image: "https://images.unsplash.com/photo-1615551365345-42f8c5f5904f?auto=format&fit=crop&q=80&w=800",
            choices: [{ text: "Play Again", next: "start" }]
        },
        home_ending: {
            text: "The cookies are great, but the fairies are still waiting! (The End)",
            image: "https://images.unsplash.com/photo-1499636136210-65422ff04a52?auto=format&fit=crop&q=80&w=800",
            choices: [{ text: "Try again?", next: "start" }]
        }
    };

    function renderScene(sceneId) {
        const scene = story[sceneId];
        document.getElementById('story-text').innerText = scene.text;
        document.getElementById('scene-image').src = scene.image;
        const choicesContainer = document.getElementById('choices');
        choicesContainer.innerHTML = ''; 

        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.text;
            btn.className = 'choice-btn';
            btn.onclick = () => renderScene(choice.next);
            choicesContainer.appendChild(btn);
        });
    }
</script>
</body>
</html>
