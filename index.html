<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Adventure Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loading-screen" style="padding: 50px; text-align:center;"><h1>🚀 Loading...</h1></div>

        <div id="profile-selection" style="display: none; padding: 20px;">
            <h1>👋 Hello!</h1>
            <p style="margin-bottom:20px;">Who is playing today?</p>
            <div id="profile-list"></div>
            <button class="btn green-btn" onclick="showNewUserForm()" style="margin-top: 25px;">+ New Explorer</button>
            <button onclick="adminLogin()" style="background:none; border:none; color:#eee; cursor:pointer; font-size: 0.7rem; margin-top: 20px; display:block; width:100%;">Admin</button>
        </div>

        <div id="name-setup" style="display: none; padding: 20px;">
            <h1>✨ New Quest</h1>
            <input type="text" id="user-name-input" placeholder="Your name..." style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 2px solid #eee; font-size: 1.3rem; margin-bottom: 20px; text-align: center; outline: none;">
            <button class="btn blue-btn" id="save-name-btn">Start! 🚀</button>
            <button onclick="initHub()" style="margin-top: 20px; background:none; border:none; color:#999; cursor:pointer;">Cancel</button>
        </div>

        <div id="main-menu" style="display: none; padding: 20px;">
            <h1>Hi, <span id="display-name">Hero</span>!</h1>
            <p style="margin-bottom:25px;">Ready for today's lesson?</p>
            <div class="nav-grid">
                <a href="school.html" class="btn green-btn">🏫 School Hub</a>
                <div class="btn btn-disabled">📖 Library <span class="coming-soon-tag">Coming Soon</span></div>
                <div class="btn btn-disabled">🎮 Games <span class="coming-soon-tag">Coming Soon</span></div>
            </div>
            <button onclick="switchUser()" style="margin-top:50px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%; max-width: 400px;">👤 Switch Profile</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loading = document.getElementById('loading-screen');
        const selection = document.getElementById('profile-selection');
        const setup = document.getElementById('name-setup');
        const menu = document.getElementById('main-menu');
        let isManageMode = false;
        const ADMIN_PIN = "9988";

        async function initHub() {
            loading.style.display = 'block'; selection.style.display = 'none'; setup.style.display = 'none'; menu.style.display = 'none';
            const activeUser = localStorage.getItem('fb_current_user');
            if (activeUser) renderMainMenu(activeUser);
            else await showProfileSelection();
        }

        async function showProfileSelection() {
            loading.style.display = 'none'; selection.style.display = 'block';
            const list = document.getElementById('profile-list'); list.innerHTML = '';
            const querySnapshot = await getDocs(collection(db, "users"));
            querySnapshot.forEach((doc) => {
                const btn = document.createElement('button');
                btn.className = "btn blue-btn";
                btn.style.width = "100%";
                btn.innerHTML = `👤 ${doc.id}`;
                if (isManageMode) {
                    btn.innerHTML += " 🗑️";
                    btn.onclick = () => deleteProfile(doc.id);
                    btn.style.background = "#ff7675";
                } else {
                    btn.onclick = () => selectProfile(doc.id);
                }
                list.appendChild(btn);
            });
        }

        window.adminLogin = () => {
            if (prompt("Admin PIN:") === ADMIN_PIN) { isManageMode = true; showProfileSelection(); }
        }

        async function deleteProfile(name) {
            if (confirm(`Delete ${name}?`)) { await deleteDoc(doc(db, "users", name)); showProfileSelection(); }
        }

        document.getElementById('save-name-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if (name) { await setDoc(doc(db, "users", name), { scores: {} }, { merge: true }); selectProfile(name); }
        };

        function selectProfile(name) { localStorage.setItem('fb_current_user', name); renderMainMenu(name); }
        function renderMainMenu(name) { loading.style.display = 'none'; selection.style.display = 'none'; setup.style.display = 'none'; menu.style.display = 'block'; document.getElementById('display-name').innerText = name; }
        window.switchUser = () => { localStorage.removeItem('fb_current_user'); isManageMode = false; initHub(); }
        window.showNewUserForm = () => { selection.style.display = 'none'; setup.style.display = 'block'; }
        
        initHub();
    </script>
</body>
</html>
