<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Adventure Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Loading Screen -->
        <div id="loading-screen" style="padding: 50px;">
            <h1>🚀 Loading...</h1>
            <p>Connecting to Adventure Cloud</p>
        </div>

        <!-- 1. PROFILE SELECTION -->
        <div id="profile-selection" style="display: none;">
            <h1>👋 Hello!</h1>
            <p style="margin-bottom:20px;">Who is playing today?</p>
            <div id="profile-list"></div>
            <button class="btn green-btn" onclick="showNewUserForm()">+ New Explorer</button>
        </div>

        <!-- 2. NEW USER FORM -->
        <div id="name-setup" style="display: none;">
            <h1>✨ New Quest</h1>
            <p>Enter your name to start:</p>
            <input type="text" id="user-name-input" placeholder="Your name..." 
                   style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #eee; font-size: 1.3rem; margin-bottom: 20px; text-align: center; outline: none; font-family: inherit;">
            <button class="btn blue-btn" id="save-name-btn">Start! 🚀</button>
            <button onclick="initHub()" style="margin-top: 20px; background:none; border:none; color:#999; cursor:pointer; text-decoration: underline;">Cancel</button>
        </div>

        <!-- 3. MAIN MENU -->
        <div id="main-menu" style="display: none;">
            <h1>Hi, <span id="display-name">Hero</span>!</h1>
            <p style="margin-bottom:30px;">What's the plan for today?</p>
            <div class="nav-grid">
                <a href="school.html" class="btn green-btn">🏫 School Hub</a>
                <a href="storybook.html" class="btn blue-btn">📖 Library</a>
                <a href="games.html" class="btn orange-btn">🎮 Games</a>
            </div>
            <button onclick="switchUser()" style="margin-top:40px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%; max-width: 400px;">👤 Switch Explorer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG FROM YOUR SCREENSHOT
        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loading = document.getElementById('loading-screen');
        const selection = document.getElementById('profile-selection');
        const setup = document.getElementById('name-setup');
        const menu = document.getElementById('main-menu');

        async function initHub() {
            loading.style.display = 'block';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'none';

            const activeUser = localStorage.getItem('fb_current_user');
            if (activeUser) {
                renderMainMenu(activeUser);
            } else {
                showProfileSelection();
            }
        }

        async function showProfileSelection() {
            loading.style.display = 'none';
            selection.style.display = 'block';
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                querySnapshot.forEach((doc) => {
                    const btn = document.createElement('button');
                    btn.className = "btn blue-btn";
                    btn.style.margin = "10px auto";
                    btn.innerHTML = `👤 ${doc.id}`;
                    btn.onclick = () => selectProfile(doc.id);
                    list.appendChild(btn);
                });
            } catch (e) { console.error(e); }
        }

        window.showNewUserForm = () => {
            selection.style.display = 'none';
            setup.style.display = 'block';
        }

        document.getElementById('save-name-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if (name) {
                await setDoc(doc(db, "users", name), { scores: {} }, { merge: true });
                selectProfile(name);
            }
        };

        function selectProfile(name) {
            localStorage.setItem('fb_current_user', name);
            renderMainMenu(name);
        }

        function renderMainMenu(name) {
            loading.style.display = 'none';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'block';
            document.getElementById('display-name').innerText = name;
        }

        window.switchUser = () => {
            localStorage.removeItem('fb_current_user');
            initHub();
        }

        initHub();
    </script>
</body>
</html>
