<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AF Adventure Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Magic Background -->
    <div class="area">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <main class="hub-wrapper">
        <div class="container">
            
            <!-- 1. PROFILE SELECTION VIEW -->
            <section id="view-select" class="view" style="display: none;">
                <div class="header">
                    <h1>👋 Welcome!</h1>
                    <p>Who is going on an adventure today?</p>
                </div>
                <div id="profile-list" class="profile-grid">
                    <!-- Profiles injected here -->
                </div>
                <button class="btn-secondary" onclick="showView('view-add')">+ Add New Explorer</button>
            </section>

            <!-- 2. ADD NEW USER VIEW -->
            <section id="view-add" class="view" style="display: none;">
                <div class="header">
                    <h1>✨ New Hero</h1>
                    <p>Enter your name to start your journey!</p>
                </div>
                <div class="input-group">
                    <input type="text" id="user-name-input" placeholder="Hero Name..." maxlength="12">
                    <button class="btn blue-btn" onclick="createNewProfile()">Create Profile</button>
                </div>
                <button class="btn-text" onclick="initHub()">Go Back</button>
            </section>

            <!-- 3. MAIN MENU VIEW -->
            <section id="view-menu" class="view" style="display: none;">
                <div class="header">
                    <h1>🌟 Hi, <span id="display-name" class="highlight">Hero</span>!</h1>
                    <div class="stat-badge">🏆 Best Score: <span id="high-score">0</span></div>
                </div>
                
                <div class="nav-menu">
                    <a href="storybook.html" class="menu-card blue">
                        <span class="menu-icon">📖</span>
                        <div class="menu-info">
                            <h3>Library</h3>
                            <p>Interactive Stories</p>
                        </div>
                    </a>
                    <a href="games.html" class="menu-card orange">
                        <span class="menu-icon">🎮</span>
                        <div class="menu-info">
                            <h3>Games</h3>
                            <p>Play & Win</p>
                        </div>
                    </a>
                </div>

                <div class="footer-actions">
                    <button class="btn-text" onclick="showView('view-select')">👤 Switch Explorer</button>
                </div>
            </section>

        </div>
    </main>

    <script>
        let hubData = JSON.parse(localStorage.getItem('hubData')) || { profiles: {}, current: null };

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(viewId).style.display = 'block';
        }

        function initHub() {
            const profiles = Object.keys(hubData.profiles);
            if (profiles.length === 0) {
                showView('view-add');
            } else if (hubData.current) {
                renderMenu();
            } else {
                renderProfileSelect();
            }
        }

        function renderProfileSelect() {
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            for (let name in hubData.profiles) {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `<div class="avatar">${name[0].toUpperCase()}</div><span>${name}</span>`;
                card.onclick = () => selectProfile(name);
                list.appendChild(card);
            }
            showView('view-select');
        }

        function createNewProfile() {
            const name = document.getElementById('user-name-input').value.trim();
            if (name && !hubData.profiles[name]) {
                hubData.profiles[name] = 0;
                selectProfile(name);
            } else if (!name) {
                alert("Please enter a name!");
            } else {
                alert("Name already taken!");
            }
        }

        function selectProfile(name) {
            hubData.current = name;
            localStorage.setItem('hubData', JSON.stringify(hubData));
            renderMenu();
        }

        function renderMenu() {
            document.getElementById('display-name').innerText = hubData.current;
            document.getElementById('high-score').innerText = hubData.profiles[hubData.current];
            showView('view-menu');
        }

        initHub();
    </script>
</body>
</html>
