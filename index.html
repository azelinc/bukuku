<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Adventure Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div id="profile-selection" style="display: none;">
            <h1>👋 Hello!</h1>
            <p style="margin-bottom:20px;">Who is playing today?</p>
            <div id="profile-list"></div>
            <button class="btn green-btn" onclick="showNewUserForm()">+ New Explorer</button>
        </div>

        <div id="name-setup" style="display: none;">
            <h1>✨ New Quest</h1>
            <p>Enter your name:</p>
            <input type="text" id="user-name-input" placeholder="Your name..." 
                   style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #eee; font-size: 1.3rem; margin-bottom: 20px; text-align: center; outline: none;">
            <button class="btn blue-btn" onclick="createNewProfile()">Start! 🚀</button>
            <button onclick="initHub()" style="margin-top: 20px; background:none; border:none; color:#999; cursor:pointer;">Cancel</button>
        </div>

        <div id="main-menu" style="display: none;">
            <h1>Hi, <span id="display-name">Hero</span>!</h1>
            <p style="margin-bottom:30px;">Ready for an adventure?</p>
            
            <a href="storybook.html" class="btn blue-btn">📖 Library</a>
            <a href="games.html" class="btn orange-btn">🎮 Games</a>
            
            <button onclick="showProfileSelection()" style="margin-top:40px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%; max-width: 400px;">👤 Switch Explorer</button>
        </div>
    </div>

    <script>
        // ... (Keep your existing script exactly as it was) ...
    </script>
</body>
</html>
