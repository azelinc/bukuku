<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AF Adventure Hub</title>
    
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        .profile-row { display: flex; align-items: center; gap: 10px; max-width: 400px; margin: 10px auto; }
        .profile-btn { flex: 1; margin: 0 !important; }
        .del-btn { background: #ff7675; border: none; color: white; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 0. LOADING SCREEN -->
        <div id="loading-screen" style="padding: 80px 20px; text-align: center;">
            <div style="font-size: 50px; margin-bottom: 20px;">🚀</div>
            <h1>Loading...</h1>
            <p style="color: #666; margin-top: 10px;">Connecting to Adventure Cloud</p>
            <button id="bypass-loading" onclick="showNewUserForm()" style="display:none; margin-top:30px; background:none; border:none; color:#4a90e2; text-decoration:underline; cursor:pointer;">Taking too long? Click here.</button>
        </div>

        <!-- 1. PROFILE SELECTION -->
        <div id="profile-selection" style="display: none;">
            <h1>👋 Welcome!</h1>
            <div class="main-menu-padding">
                <p id="selection-sub" style="margin-bottom: 20px; color: #666;">Who is playing today?</p>
                <div id="profile-list"></div>
                
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn green-btn" onclick="showNewUserForm()">+ New Explorer</button>
                    <button id="manage-toggle" onclick="adminLogin()" style="background:none; border:none; color:#eee; cursor:pointer; font-size: 0.7rem; margin-top: 10px;">Admin</button>
                </div>
            </div>
        </div>

        <!-- 2. NEW USER FORM -->
        <div id="name-setup" style="display: none;">
            <h1>✨ New Quest</h1>
            <div class="main-menu-padding">
                <p style="margin-bottom: 15px; color: #666;">Enter your name to start:</p>
                <input type="text" id="user-name-input" placeholder="Your name..." style="padding: 18px; width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #eee; font-size: 1.3rem; margin-bottom: 10px; text-align: center; outline: none; font-family: inherit;">
                <button class="btn blue-btn" id="save-name-btn">Start! 🚀</button>
                <button onclick="initHub()" style="margin-top: 15px; background:none; border:none; color:#999; cursor:pointer; text-decoration: underline;">Cancel</button>
            </div>
        </div>

        <!-- 3. MAIN MENU -->
        <div id="main-menu" style="display: none;">
            <h1 id="menu-header">Hi, Explorer!</h1>
            <div class="main-menu-padding">
                <p style="margin-bottom:20px; color: #666;">Ready for today's lesson?</p>
                <div class="nav-grid">
                    <a href="school.html" class="btn green-btn">🏫 School Hub</a>
                    <div class="btn btn-disabled">📖 Library <span class="coming-soon-tag">Coming Soon</span></div>
                    <div class="btn btn-disabled">🎮 Games <span class="coming-soon-tag">Coming Soon</span></div>
                </div>
                <button onclick="switchUser()" style="margin-top:30px; background:#f4f4f4; border:none; padding:15px; border-radius:15px; cursor:pointer; font-weight: bold; color: #888; width: 100%; max-width: 400px;">👤 Switch Profile</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs",
            authDomain: "af-adventure-hub.firebaseapp.com",
            projectId: "af-adventure-hub",
            storageBucket: "af-adventure-hub.firebasestorage.app",
            messagingSenderId: "440085894217",
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loading = document.getElementById('loading-screen');
        const selection = document.getElementById('profile-selection');
        const setup = document.getElementById('name-setup');
        const menu = document.getElementById('main-menu');
        
        let isManageMode = false;
        const ADMIN_PIN = "9988";

        // Safety Timeout: Show manual bypass if Firebase is slow
        setTimeout(() => {
            if (loading.style.display !== 'none') {
                document.getElementById('bypass-loading').style.display = 'block';
            }
        }, 5000);

        async function initHub() {
            console.log("Checking session...");
            loading.style.display = 'block';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'none';

            const activeUser = localStorage.getItem('fb_current_user');
            if (activeUser) {
                renderMainMenu(activeUser);
            } else {
                await showProfileSelection();
            }
        }

        async function showProfileSelection() {
            console.log("Fetching profiles from cloud...");
            loading.style.display = 'none';
            selection.style.display = 'block';
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                if (querySnapshot.empty) {
                    console.log("No profiles found.");
                    list.innerHTML = '<p style="color:#999; margin:20px;">No explorers yet.</p>';
                }
                querySnapshot.forEach((doc) => {
                    const row = document.createElement('div');
                    row.className = "profile-row";
                    const btn = document.createElement('button');
                    btn.className = "btn blue-btn profile-btn";
                    btn.innerHTML = `👤 ${doc.id}`;
                    btn.onclick = () => selectProfile(doc.id);
                    const delBtn = document.createElement('button');
                    delBtn.className = "del-btn";
                    delBtn.innerHTML = "🗑️";
                    delBtn.style.display = isManageMode ? "block" : "none";
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteProfile(doc.id); };
                    row.appendChild(btn); row.appendChild(delBtn);
                    list.appendChild(row);
                });
            } catch (e) {
                console.error("Firebase fetch failed:", e);
                list.innerHTML = '<p style="color:red;">Cloud connection error. Try refreshing.</p>';
            }
        }

        // Attach to window so HTML onclicks work
        window.showNewUserForm = () => {
            loading.style.display = 'none';
            selection.style.display = 'none';
            setup.style.display = 'block';
        }

        window.adminLogin = () => {
            const entry = prompt("Enter Admin PIN:");
            if (entry === ADMIN_PIN) {
                isManageMode = true;
                document.getElementById('selection-sub').innerText = "⚠️ ADMIN MODE";
                showProfileSelection();
            }
        }

        async function deleteProfile(name) {
            if (confirm(`Delete "${name}"?`)) {
                await deleteDoc(doc(db, "users", name));
                showProfileSelection();
            }
        }

        document.getElementById('save-name-btn').onclick = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if (name) {
                const btn = document.getElementById('save-name-btn');
                btn.innerText = "Saving...";
                btn.disabled = true;
                try {
                    await setDoc(doc(db, "users", name), { lastActive: new Date() }, { merge: true });
                    selectProfile(name);
                } catch (e) {
                    alert("Cloud save failed.");
                    btn.innerText = "Start! 🚀";
                    btn.disabled = false;
                }
            }
        };

        function selectProfile(name) {
            localStorage.setItem('fb_current_user', name);
            renderMainMenu(name);
        }

        function renderMainMenu(name) {
            loading.style.display = 'none';
            selection.style.display = 'none';
            setup.style.display = 'none';
            menu.style.display = 'block';
            document.getElementById('menu-header').innerHTML = `Hi, <span id="display-name">${name}</span>!`;
        }

        window.switchUser = () => {
            localStorage.removeItem('fb_current_user');
            isManageMode = false;
            initHub();
        }

        window.initHub = initHub;
        initHub();
    </script>
</body>
</html>
