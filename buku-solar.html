<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenaga Solar - STEM Explorer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FIX: Limits image size so it doesn't become oversized */
        #main-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 4px solid #2ecc71;
            display: block;
        }

        .fact-card {
            background: #f0fff4;
            border: 3px solid #2ecc71;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #fact-title { 
            color: #27ae60; 
            font-size: 1.4rem; 
            margin-bottom: 10px; 
            font-weight: bold;
        }

        #progress-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Progress Bar -->
        <div style="width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden;">
            <div id="prog-bar" style="width: 20%; background: #2ecc71; height: 10px; transition: 0.5s;"></div>
        </div>

        <h1 style="color: #27ae60;">☀️ Tenaga Solar</h1>
        
        <!-- The Fixed Image -->
        <img id="main-img" src="" alt="Tenaga Solar">
        
        <div class="fact-card">
            <div id="fact-title">Memuatkan...</div>
            <p id="main-text" style="font-size: 1.1rem; line-height: 1.6;">Sila tunggu sebentar...</p>
        </div>

        <div id="progress-text">Fakta 1 dari 5</div>

        <div style="margin-top: 25px;">
            <button id="next-btn" class="btn green-btn" onclick="nextPage()">Fakta Seterusnya ➡️</button>
        </div>

        <hr style="margin: 25px 0; opacity: 0.1;">
        <a href="storybook.html" class="btn red-btn" style="font-size: 1rem; padding: 12px;">📚 Kembali ke Perpustakaan</a>
    </div>

    <script>
        // 1. PERSONALISATION: Get user profile name
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { current: "Explorer" };
        const kidName = hubData.current || "Explorer";

        // 2. DATA FAKTA (Using backticks for personalisation)
        const facts = [
            {
                title: "Apa itu Tenaga Solar?",
                text: `Hai ${kidName}! Tenaga solar adalah tenaga hebat yang kita dapat terus daripada cahaya matahari. Ia sangat bersih!`,
                image: "https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?w=800"
            },
            {
                title: "Panel Solar",
                text: "Panel hitam di atas bumbung menukar cahaya matahari menjadi elektrik untuk lampu dan TV di rumah anda.",
                image: "https://images.unsplash.com/photo-1509391366360-fe5bb65830bb?w=800"
            },
            {
                title: "Sangat Kuat!",
                text: `${kidName}, tahukah anda? Cahaya matahari dalam satu jam cukup untuk membekalkan tenaga kepada seluruh dunia selama setahun!`,
                image: "https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?w=800"
            },
            {
                title: "Mesra Alam",
                text: "Tenaga solar tidak mengeluarkan asap kotor. Ia membantu menjaga bumi kita supaya tetap hijau dan segar.",
                image: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=800"
            },
            {
                title: "Pakar Solar!",
                text: `Hebat! ${kidName} kini sudah tahu rahsia matahari. Gunakan pengetahuan ini untuk menjaga planet kita!`,
                image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800"
            }
        ];

        let currentIndex = 0;

        function updateUI() {
            const current = facts[currentIndex];
            document.getElementById('fact-title').innerText = current.title;
            document.getElementById('main-text').innerText = current.text;
            document.getElementById('main-img').src = current.image;
            
            // Update progress
            const prog = ((currentIndex + 1) / facts.length) * 100;
            document.getElementById('prog-bar').style.width = prog + "%";
            document.getElementById('progress-text').innerText = `Fakta ${currentIndex + 1} dari ${facts.length}`;

            if (currentIndex === facts.length - 1) {
                document.getElementById('next-btn').innerText = "Tamat & Jadi Pakar! 🌟";
            }
        }

        function nextPage() {
            if (currentIndex < facts.length - 1) {
                currentIndex++;
                window.scrollTo(0, 0); // Scroll to top for mobile
                updateUI();
            } else {
                alert(`Tahniah ${kidName}! Anda kini seorang Pakar Tenaga Solar! ☀️`);
                window.location.href = "storybook.html";
            }
        }

        updateUI();
    </script>
</body>
</html>
