<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High School Hub - AF Hub</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5351/5351460.png">

    <!-- Link to PC Styles -->
    <link rel="stylesheet" href="pc.css" media="screen and (min-width: 601px)">
    
    <!-- Link to Mobile Styles -->
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 600px)">

    <style>
        #subject-filter-container::-webkit-scrollbar { display: none; }
        #subject-filter-container { scrollbar-width: none; -ms-overflow-style: none; }
        #subject-bar .filter-btn { border-radius: 50px; padding: 8px 18px; white-space: nowrap; font-size: 0.85rem; }
        .filter-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .filter-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; background: white; font-weight: bold; color: #555; transition: 0.2s; }
        .filter-btn.active { background: #1a1a2e !important; color: white !important; border-color: #1a1a2e !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; border: 5px solid #f1c40f; }
        .locked { background-color: #f0f0f0 !important; color: #ccc !important; cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body>

    <div id="premium-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="color: #f39c12; margin-bottom: 10px;">⭐ Unlock Premium</h2>
            <p style="margin-bottom: 20px; color: #666; line-height: 1.5;">Access all secondary school sets (6-10) and support your learning journey!</p>
            <button class="btn orange-btn" onclick="requestPremium()">Upgrade via WhatsApp</button>
            <button onclick="closePremiumModal()" style="background:none; border:none; color:#999; cursor:pointer; text-decoration:underline; margin-top:15px; width:100%;">Maybe Later</button>
        </div>
    </div>

    <div class="container wide-container">
        <header class="app-header">
            <h1>🏫 Secondary School Hub</h1>
            <div class="header-right">
                <span id="user-badge" class="user-badge">Explorer</span>
                <a href="index.html" class="home-icon-btn">🏠</a>
            </div>
        </header>

        <div class="overall-progress-container" id="global-progress-box">
            <div class="progress-label">
                <span id="progress-text-label">Overall Progress </span>
                <span id="progress-percent-label">0 %</span>
            </div>
            <div class="progress-bg"><div id="progress-fill-bar" class="progress-fill"></div></div>
        </div>

        <div class="library-layout">
            <div class="sidebar">
                <button id="tab-tuition" class="tab-btn active" onclick="openTab('tuition', this)">🎓 Tuition</button>
                <div style="flex-grow: 1;"></div>
            </div>

            <div class="main-content">
                <div id="tuition" class="category-content" style="display: block;">
                    <div id="subject-filter-container">
                        <div id="subject-bar" style="display: inline-flex; gap: 8px; padding: 5px;"></div>
                    </div>

                    <div class="filter-bar">
                        <button class="filter-btn active" onclick="window.filterGrade('all', this)">All</button>
                        <button class="filter-btn" onclick="window.filterGrade('1', this)">Form 1</button>
                        <button class="filter-btn" onclick="window.filterGrade('2', this)">Form 2</button>
                        <button class="filter-btn" onclick="window.filterGrade('3', this)">Form 3</button>
                    </div>

                    <div id="matrix-container">
                        <p style="text-align:center; padding: 20px;">Connecting to Cloud...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDX9zxB-clkB6_DKSaDmWpjQwMgDY439cs", 
            authDomain: "af-adventure-hub.firebaseapp.com", 
            projectId: "af-adventure-hub", 
            storageBucket: "af-adventure-hub.firebasestorage.app", 
            messagingSenderId: "440085894217", 
            appId: "1:440085894217:web:74ee3d6a0a9eb377c45b98" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const kidName = localStorage.getItem('fb_current_user') || "Explorer";

        let activeGrade = 'all';
        let activeSubject = 'all';
        let cachedScores = {}; 
        let isPremiumUser = false;

        const subjects = [
            { id: 'math', name: 'Mathematics', color: '#4a90e2', icon: '🔢', sets: 10 }, 
            { id: 'sci', name: 'Science', color: '#0097a7', icon: '🧪', sets: 10 }, 
            { id: 'eng', name: 'English', color: '#f39c12', icon: '📖', sets: 10 }
        ];

        async function updateBadge() {
            const userDoc = await getDoc(doc(db, "users", kidName));
            isPremiumUser = userDoc.exists() ? userDoc.data().isPremium : false;
            document.getElementById('user-badge').innerHTML = `👤 ${kidName}${isPremiumUser ? ' <span style="color:#f1c40f">⭐</span>' : ''}`;
        }

        async function generateHub() {
            await updateBadge();
            const container = document.getElementById('matrix-container');
            
            try {
                const userDoc = await getDoc(doc(db, "users", kidName));
                if (userDoc.exists()) cachedScores = userDoc.data().scores || {};
            } catch (e) { console.error(e); }

            container.innerHTML = '';
            subjects.forEach(sub => {
                let html = `<div class="subject-card" id="card-${sub.id}"><h3 style="color:${sub.color}; font-size: 0.95rem; margin-bottom: 8px;">${sub.name}</h3>`;
                [1, 2, 3].forEach(lvl => {
                    html += `<div class="grade-row grade-block-${lvl}"><div class="grade-label">Form ${lvl}</div><div class="set-group">`;
                    for (let setNum = 1; setNum <= sub.sets; setNum++) {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        const bestScore = cachedScores[scoreKey] || 0;
                        let isLocked = (!isPremiumUser && setNum >= 6);
                        if (isLocked) html += `<div class="set-circle locked" onclick="window.openPremiumModal()"><span>🔒</span></div>`;
                        else html += `<a href="tuition-quiz.html?sub=${sub.id}&lvl=${lvl}&set=${setNum}" class="set-circle ${bestScore >= 5 ? 'done' : ''}" style="background-color: ${sub.color}"><span>${setNum}</span>${bestScore > 0 ? '<small>' + bestScore + '/10</small>' : ''}</a>`;
                    }
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });

            generateSubjectFilters();
            window.updateProgressBar('all');
        }

        function generateSubjectFilters() {
            const bar = document.getElementById('subject-bar');
            bar.innerHTML = `<button class="filter-btn active" onclick="window.filterSubject('all', this)">All Subjects</button>`;
            subjects.forEach(sub => {
                bar.innerHTML += `<button class="filter-btn" onclick="window.filterSubject('${sub.id}', this)">${sub.icon} ${sub.name}</button>`;
            });
        }

        window.filterSubject = (subId, btn) => {
            activeSubject = subId;
            const btns = document.getElementById('subject-bar').getElementsByClassName('filter-btn');
            for(let b of btns) b.classList.remove('active');
            btn.classList.add('active');
            applyFilters();
        };

        window.filterGrade = (lvl, btn) => {
            activeGrade = lvl;
            const btns = document.querySelector('.filter-bar').querySelectorAll('.filter-btn');
            for(let b of btns) b.classList.remove('active');
            btn.classList.add('active');
            applyFilters();
        };

        function applyFilters() {
            const cards = document.getElementsByClassName('subject-card');
            for (let card of cards) {
                const matchesSub = (activeSubject === 'all' || card.id === `card-${activeSubject}`);
                card.style.display = matchesSub ? 'block' : 'none';
            }
            const rows = document.getElementsByClassName('grade-row');
            for (let row of rows) {
                const matchesGrade = (activeGrade === 'all' || row.classList.contains(`grade-block-${activeGrade}`));
                row.style.display = matchesGrade ? 'flex' : 'none';
            }
            window.updateProgressBar(activeGrade);
        }

        window.updateProgressBar = (filter) => {
            let totalPossible = 0; let userEarned = 0;
            subjects.forEach(sub => {
                const levels = (filter === 'all') ? [1, 2, 3] : [parseInt(filter)];
                levels.forEach(lvl => {
                    totalPossible += (sub.sets * 10);
                    for (let setNum = 1; setNum <= sub.sets; setNum++) {
                        const scoreKey = `${sub.id}-${lvl}-${setNum}`;
                        userEarned += (cachedScores[scoreKey] || 0);
                    }
                });
            });
            const percent = totalPossible > 0 ? Math.round((userEarned / totalPossible) * 100) : 0;
            document.getElementById('progress-fill-bar').style.width = percent + "%";
            document.getElementById('progress-percent-label').innerText = percent + " %";
            document.getElementById('progress-text-label').innerText = (filter === 'all') ? "Completion\u00A0" : `Form ${filter} Completion\u00A0`;
        };

        window.openPremiumModal = () => document.getElementById('premium-modal').style.display = 'flex';
        window.closePremiumModal = () => document.getElementById('premium-modal').style.display = 'none';
        window.requestPremium = () => {
            const msg = encodeURIComponent(`Hi! I want to upgrade account "${kidName}" to High School Premium.`);
            window.open(`https://wa.me/60122750485?text=${msg}`, '_blank');
        }

        window.openTab = (categoryName, element) => {
            // High school version only has tuition, no tab switching needed
        }

        generateHub();
    </script>
</body>
</html>
