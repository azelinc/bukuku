<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon of Star-Mist Mountain</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Fix for the Image */
        #scene-image {
            width: 100%;
            max-height: 250px; /* Limits the height so it doesn't fill the screen */
            object-fit: cover; /* Crops the image nicely to fit the box */
            border-radius: 15px;
            margin-bottom: 20px;
            border: 4px solid #f0f0f0;
            display: block;
        }

        /* Adjusting the progress bar to be cleaner */
        #progress-container {
            width: 100%;
            background: #eee;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Ensuring text doesn't touch the edges */
        #story-text {
            padding: 0 10px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Progress Bar -->
        <div id="progress-container">
            <div id="progress-bar" style="width: 20%; background: #4a90e2; height: 100%; transition: 0.5s;"></div>
        </div>

        <!-- The Image (Now Fixed) -->
        <img id="scene-image" src="" alt="Story Scene">
        
        <!-- The Story Text -->
        <h1 id="story-text">Loading story...</h1>
        
        <!-- The Choice Buttons -->
        <div id="choices"></div>

        <hr style="margin: 25px 0; opacity: 0.1;">
        
        <!-- Back to Library -->
        <a href="storybook.html" class="btn red-btn">📚 Back to Library</a>
    </div>

    <script>
        // 1. GET USER PROFILE DATA
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { current: "Explorer" };
        const kidName = hubData.current || "Explorer";

        // 2. THE STORY DATA
        const story = {
            start: {
                text: `Hi ${kidName}! You find a glowing map in your backyard. It points to the top of Star-Mist Mountain. Do you want to go on a quest?`,
                image: "https://images.unsplash.com/photo-1532012197267-da84d127e765?w=800",
                progress: "20%",
                choices: [
                    { text: "Yes! Pack my bag!", next: "woods" },
                    { text: "No, stay and play", next: "home" }
                ]
            },
            woods: {
                text: `You enter the Whispering Woods. A fairy named Pip flies down. "Wait, ${kidName}!" she squeaks. "The trees are grumpy. Will you sing them a song?"`,
                image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800",
                progress: "40%",
                choices: [
                    { text: "Sing a happy song", next: "mountain" },
                    { text: "Give them a cookie", next: "mountain" }
                ]
            },
            mountain: {
                text: `You find Spark the Dragon. He is shivering! "It's so cold up here," Spark whispers. What should ${kidName} do?`,
                image: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800",
                progress: "70%",
                choices: [
                    { text: "Give him a Magic Blanket", next: "win" },
                    { text: "Build a campfire", next: "win" }
                ]
            },
            win: {
                text: `Spark is warm! He gives you a giant dragon-hug. "Thank you, ${kidName}! You are a hero!" He flies you back home.`,
                image: "https://images.unsplash.com/photo-1615551365345-42f8c5f5904f?w=800",
                progress: "100%",
                choices: [
                    { text: "Read Again", next: "start" }
                ]
            },
            home: {
                text: `You stayed home. It's cozy, but you wonder what adventures you missed!`,
                image: "https://images.unsplash.com/photo-1499636136210-65422ff04a52?w=800",
                progress: "100%",
                choices: [
                    { text: "Actually, let's go!", next: "start" }
                ]
            }
        };

        function renderScene(sceneId) {
            const scene = story[sceneId];
            document.getElementById('story-text').innerText = scene.text;
            document.getElementById('scene-image').src = scene.image;
            document.getElementById('progress-bar').style.width = scene.progress;
            
            const choicesContainer = document.getElementById('choices');
            choicesContainer.innerHTML = ''; 

            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice.text;
                btn.className = 'btn blue-btn';
                btn.onclick = () => {
                    window.scrollTo(0, 0);
                    renderScene(choice.next);
                };
                choicesContainer.appendChild(btn);
            });
        }

        renderScene('start');
    </script>

</body>
</html>
