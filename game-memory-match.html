<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Match</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .card { height: 70px; background: #4a90e2; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 30px; color: transparent; cursor: pointer; transition: 0.3s; border-bottom: 4px solid #2e6cb5; }
        .card.flipped { background: white; color: black; transform: rotateY(180deg); border-bottom: none; }
        .card.matched { background: #2ecc71; border: none; visibility: visible; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Magic Match</h1>
        <div id="stats" style="font-weight: bold; color: #4a90e2; margin-bottom: 10px;">Moves: 0 | Pairs: 0/8</div>
        <div class="game-grid" id="grid"></div>
        <button class="btn blue-btn" onclick="location.reload()">Reset Game</button>
        <a href="games.html" class="btn red-btn" style="margin-top: 15px;">🔙 Back to Games</a>
    </div>

    <script>
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { current: "Explorer" };
        const kidName = hubData.current;
        const emojis = ['🐉','🐉','🧚','🧚','🦄','🦄','🍄','🍄','💎','💎','⭐','⭐','🍎','🍎','🏰','🏰'];
        let flipped = [];
        let pairs = 0;
        let moves = 0;
        let canClick = true;

        function init() {
            const grid = document.getElementById('grid');
            emojis.sort(() => Math.random() - 0.5).forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.onclick = () => {
                    if (!canClick || card.classList.contains('flipped')) return;
                    card.classList.add('flipped');
                    card.innerText = card.dataset.emoji;
                    flipped.push(card);
                    if (flipped.length === 2) check();
                };
                grid.appendChild(card);
            });
        }

        function check() {
            canClick = false;
            moves++;
            const [c1, c2] = flipped;
            if (c1.dataset.emoji === c2.dataset.emoji) {
                c1.classList.add('matched'); c2.classList.add('matched');
                pairs++;
                flipped = []; canClick = true;
                if (pairs === 8) alert(`Amazing job, ${kidName}! You won in ${moves} moves!`);
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped'); c2.classList.remove('flipped');
                    c1.innerText = ''; c2.innerText = '';
                    flipped = []; canClick = true;
                }, 800);
            }
            document.getElementById('stats').innerText = `Moves: ${moves} | Pairs: ${pairs}/8`;
        }
        init();
    </script>
</body>
</html>
