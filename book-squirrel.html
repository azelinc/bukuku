<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutty's Big Adventure</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Fix for the Image */
        #book-image {
            width: 100%;
            max-height: 250px; /* Limits the height */
            object-fit: cover; /* Crops nicely */
            border-radius: 15px;
            margin-bottom: 20px;
            border: 4px solid #f0f0f0;
            display: block;
        }

        #page-number { 
            font-weight: bold; 
            color: #f39c12; 
            margin-bottom: 10px; 
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .nav-controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
        }

        /* Make nav buttons a bit smaller than the main category buttons */
        .nav-btn {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="page-number">Page 1</div>
        
        <img id="book-image" src="" alt="Story image">
        
        <h1 id="book-text" style="font-size: 1.3rem; line-height: 1.5; min-height: 100px;">Loading story...</h1>
        
        <div class="nav-controls">
            <button id="prev-btn" class="btn red-btn nav-btn" onclick="changePage(-1)">⬅️ Back</button>
            <button id="next-btn" class="btn blue-btn nav-btn" onclick="changePage(1)">Next ➡️</button>
        </div>

        <hr style="margin: 25px 0; opacity: 0.1;">
        <a href="storybook.html" class="btn orange-btn" style="font-size: 1rem; padding: 12px;">📚 Back to Library</a>
    </div>

    <script>
        // 1. GET USER PROFILE DATA
        const hubData = JSON.parse(localStorage.getItem('hubData')) || { current: "Explorer" };
        const kidName = hubData.current || "Explorer";

        // 2. STATIC STORY PAGES
        const pages = [
            {
                text: `Once upon a time, in a deep green forest, ${kidName} met a small squirrel named Nutty. Nutty had found the biggest acorn ever!`,
                image: "https://images.unsplash.com/photo-1507332130424-037149728271?w=800"
            },
            {
                text: "But there was a problem! The acorn was so heavy that Nutty could not push it up the hill to his nest.",
                image: "https://images.unsplash.com/photo-1444464666168-49d633b86797?w=800"
            },
            {
                text: `"Don't worry," said ${kidName}. "I will help you!" Together, they pushed and puffed until the acorn reached the top.`,
                image: "https://images.unsplash.com/photo-1452570053594-1b985d6ea890?w=800"
            },
            {
                text: `Nutty was so happy! He invited ${kidName} to a forest party. They shared the acorn with all the birds and bunnies. The End!`,
                image: "https://images.unsplash.com/photo-1500629408124-70659635b756?w=800"
            }
        ];

        let currentPage = 0;

        function updatePage() {
            const page = pages[currentPage];
            document.getElementById('book-text').innerText = page.text;
            document.getElementById('book-image').src = page.image;
            document.getElementById('page-number').innerText = `Page ${currentPage + 1} of ${pages.length}`;

            // Hide Back button if on first page
            document.getElementById('prev-btn').style.visibility = (currentPage === 0) ? "hidden" : "visible";
            
            // Change "Next" button text on the last page
            const nextBtn = document.getElementById('next-btn');
            if (currentPage === pages.length - 1) {
                nextBtn.innerText = "Finish 🎉";
                nextBtn.onclick = () => window.location.href = "storybook.html";
            } else {
                nextBtn.innerText = "Next ➡️";
                nextBtn.onclick = () => changePage(1);
            }
        }

        function changePage(step) {
            currentPage += step;
            window.scrollTo(0, 0); // Scroll to top for mobile users
            updatePage();
        }

        // Initialize
        updatePage();
    </script>
</body>
</html>
