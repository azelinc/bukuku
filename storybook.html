<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magic Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div style="padding: 20px; border-bottom: 2px solid #eee; text-align: center;">
            <h1>📚 Magic Library</h1>
        </div>

        <div class="library-layout">
            <!-- LEFT: SIDEBAR (TABS) -->
            <div class="sidebar">
                <button class="tab-btn active" onclick="openTab(event, 'interactive')">🕹️ Interactive</button>
                <button class="tab-btn" onclick="openTab(event, 'story')">📖 Storybooks</button>
                <button class="tab-btn" onclick="openTab(event, 'stem')">🧪 STEM Facts</button>
                
                <hr style="margin: 15px 0; opacity: 0.1;">
                <a href="index.html" class="tab-btn" style="text-decoration:none; color:#e74c3c; text-align:center;">🏠 Home</a>
            </div>

            <!-- RIGHT: MAIN CONTENT -->
            <div class="main-content">
                
                <!-- INTERACTIVE SECTION -->
                <div id="interactive" class="category-content">
                    <h2>🕹️ Interactive</h2>
                    <p style="color:#666; font-size: 0.9rem; margin-bottom: 15px;">Make choices to win!</p>
                    <a href="book-dragon.html" class="btn blue-btn">🐉 Dragon Mountain</a>
                </div>

                <!-- STORYBOOK SECTION -->
                <div id="story" class="category-content" style="display:none;">
                    <h2>📖 Storybooks</h2>
                    <p style="color:#666; font-size: 0.9rem; margin-bottom: 15px;">Sit back and read.</p>
                    <a href="book-squirrel.html" class="btn orange-btn">🐿️ Nutty’s Big Day</a>
                </div>

                <!-- STEM SECTION -->
                <div id="stem" class="category-content" style="display:none;">
                    <h2>🧪 STEM Facts</h2>
                    <p style="color:#666; font-size: 0.9rem; margin-bottom: 15px;">Learn amazing things!</p>
                    <a href="book-space.html" class="btn green-btn">🚀 Mission to Mars</a>
                    <a href="buku-tenaga-solar.html" class="btn green-btn">☀️ Tenaga Solar</a>
                    <a href="buku-tenaga-air.html" class="btn green-btn">🌊 Kuasa Empangan</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        function openTab(evt, categoryName) {
            // 1. Hide all book lists
            const contents = document.getElementsByClassName("category-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].style.display = "none";
            }

            // 2. Remove "active" color from all tabs
            const tabs = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            // 3. Show the selected category and highlight the tab
            document.getElementById(categoryName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
