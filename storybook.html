<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission to Mars - STEM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .fact-card {
            background: #f0fff4;
            border: 3px solid #2ecc71;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
        }
        #fact-title { color: #27ae60; font-size: 1.4rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #27ae60;">🚀 Mission to Mars</h1>
        <img id="space-img" src="" alt="Space">
        
        <div class="fact-card">
            <div id="fact-title">Did you know?</div>
            <p id="space-text">Loading space data...</p>
        </div>

        <div style="margin-top: 20px;">
            <button id="next-btn" class="btn green-btn" onclick="nextFact()" style="background: #2ecc71; color: white; padding: 15px 30px; border-radius: 50px; border:none; border-bottom: 5px solid #27ae60; font-weight: bold;">Next Fact ➡️</button>
        </div>

        <hr style="margin: 20px 0; opacity: 0.2;">
        <a href="storybook.html" class="btn orange-btn">📚 Back to Library</a>
    </div>

    <script>
        const facts = [
            {
                title: "The Red Planet",
                text: "Mars is known as the Red Planet because its surface is covered in iron oxide—the same stuff that makes an old bike rusty!",
                image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=800"
            },
            {
                title: "Giant Volcanoes",
                text: "Mars has the biggest volcano in the entire solar system! It's called Olympus Mons and it's 3 times taller than Mount Everest.",
                image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800"
            },
            {
                title: "Bouncy Jumps",
                text: "Gravity on Mars is much weaker than on Earth. If you could stand on Mars, you could jump 3 times as high as you can right now!",
                image: "https://images.unsplash.com/photo-1541185933-ef5d8ed016c2?w=800"
            }
        ];

        let currentFact = 0;

        function nextFact() {
            currentFact++;
            if (currentFact >= facts.length) {
                alert("You've become a Mars Expert! 🌟");
                window.location.href = "storybook.html";
                return;
            }
            showFact();
        }

        function showFact() {
            const f = facts[currentFact];
            document.getElementById('fact-title').innerText = f.title;
            document.getElementById('space-text').innerText = f.text;
            document.getElementById('space-img').src = f.image;
        }

        showFact();
    </script>
</body>
</html>
